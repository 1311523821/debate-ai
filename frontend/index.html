<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DebateAI — 双模型对抗辩论平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#fafafa',
            card: '#ffffff',
            border: '#e5e7eb',
            subtle: '#f3f4f6',
            txt: { 1: '#111827', 2: '#374151', 3: '#6b7280', 4: '#9ca3af' },
            blue: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            rose: { 50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48' },
            green: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 400: '#34d399', 500: '#10b981', 600: '#059669' },
            violet: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' },
            amber: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 400: '#fbbf24', 500: '#f59e0b' },
          }
        }
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif; }
    body { background: #fafafa; color: #111827; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    @keyframes slideL { from { opacity:0; transform:translateX(-16px) } to { opacity:1; transform:translateX(0) } }
    @keyframes slideR { from { opacity:0; transform:translateX(16px) } to { opacity:1; transform:translateX(0) } }
    @keyframes typingBounce { 0%,80%,100% { transform:translateY(0) } 40% { transform:translateY(-5px) } }
    @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.5 } }

    .fade-up { animation: fadeUp .35s ease-out forwards; }
    .slide-l { animation: slideL .4s ease-out forwards; }
    .slide-r { animation: slideR .4s ease-out forwards; }

    .typing-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:#9ca3af; margin:0 2px; animation:typingBounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay:-.32s }
    .typing-dot:nth-child(2) { animation-delay:-.16s }

    .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; }
    .card:hover { border-color:#d1d5db; box-shadow: 0 1px 3px rgba(0,0,0,.04); }

    .input-box { background:#fff; border:1px solid #e5e7eb; border-radius:8px; color:#111827; transition: all .15s; }
    .input-box::placeholder { color:#9ca3af; }
    .input-box:focus { border-color:#3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); outline:none; }

    .btn { border-radius:8px; font-weight:600; font-size:.875rem; transition:all .15s; cursor:pointer; }
    .btn:active { transform:scale(.97) }

    .btn-blue { background:#3b82f6; color:#fff; }
    .btn-blue:hover { background:#2563eb; }
    .btn-blue:disabled { background:#dbeafe; color:#93c5fd; cursor:not-allowed; }

    .btn-ghost { background:#f3f4f6; border:1px solid #e5e7eb; color:#374151; }
    .btn-ghost:hover { background:#e5e7eb; }

    .btn-red { background:#fef2f2; border:1px solid #fecaca; color:#ef4444; }
    .btn-red:hover { background:#fee2e2; }

    .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:9999px; font-size:.75rem; font-weight:600; }

    .bubble { border-radius:12px; padding:16px; font-size:.875rem; line-height:1.7; }
    .bubble-a { background:#eff6ff; border:1px solid #bfdbfe; }
    .bubble-b { background:#fff1f2; border:1px solid #fecdd3; }
    .bubble-consensus { background:#ecfdf5; border:1px solid #a7f3d0; }

    .md-content { color:#374151; }
    .md-content h1,.md-content h2,.md-content h3 { font-weight:700; margin-top:.8em; margin-bottom:.4em; color:#111827; }
    .md-content h1 { font-size:1.3em } .md-content h2 { font-size:1.1em } .md-content h3 { font-size:1em }
    .md-content p { margin-bottom:.6em; }
    .md-content ul,.md-content ol { margin-left:1.5em; margin-bottom:.6em }
    .md-content li { margin-bottom:.2em }
    .md-content code { background:#f3f4f6; padding:.1em .3em; border-radius:4px; font-size:.85em; color:#7c3aed; }
    .md-content pre { background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px; padding:.8em; overflow-x:auto; margin:.6em 0 }
    .md-content pre code { background:transparent; padding:0; font-size:.82em; line-height:1.6; color:#111827 }
    .md-content blockquote { border-left:3px solid #3b82f6; padding-left:.8em; color:#6b7280; margin:.6em 0 }
    .md-content table { border-collapse:collapse; width:100%; margin:.6em 0 }
    .md-content th,.md-content td { border:1px solid #e5e7eb; padding:.4em .6em; text-align:left }
    .md-content th { background:#f3f4f6; font-weight:600; color:#374151 }
    .md-content strong { color:#111827; }
    .md-content a { color:#3b82f6; text-decoration:underline }

    .prompt-textarea { font-family:'Courier New',monospace; font-size:.8rem; line-height:1.5; tab-size:2 }

    .header-bar { background:#fff; border-bottom:1px solid #e5e7eb; }

    .progress-shimmer { background:linear-gradient(90deg,#3b82f6,#60a5fa,#3b82f6); background-size:200% 100%; animation:shimmer 2s linear infinite; height:3px; border-radius:999px; }
  </style>
</head>

<body class="min-h-screen" x-data="debateApp()" x-init="init()">

  <!-- Header -->
  <header class="header-bar sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center text-white font-bold text-sm shadow-sm">D</div>
        <span class="text-base font-bold text-txt-1 tracking-tight">DebateAI</span>
        <span class="text-xs text-txt-4 ml-1" x-text="t('subtitle')"></span>
      </div>
      <div class="flex items-center gap-2">
        <button @click="toggleLang()" class="btn btn-ghost px-3 py-1.5 text-xs" x-text="lang === 'zh' ? 'EN' : '中文'"></button>
        <button @click="showHistory = !showHistory" class="btn btn-ghost px-3 py-1.5 text-xs relative">
          📜 <span x-text="t('history')"></span>
          <span x-show="historyList.length > 0" class="absolute -top-1.5 -right-1.5 min-w-[16px] h-4 px-1 bg-blue-500 rounded-full text-[10px] text-white flex items-center justify-center font-bold" x-text="historyList.length"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- History Sidebar -->
  <div x-show="showHistory" x-cloak
       x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-40 bg-black/30" @click.self="showHistory = false">
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-sm bg-white border-l border-border overflow-y-auto shadow-xl"
         x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
      <div class="p-4 border-b border-border flex items-center justify-between sticky top-0 bg-white z-10">
        <h2 class="text-base font-bold text-txt-1" x-text="t('debateHistory')"></h2>
        <button @click="showHistory = false" class="w-7 h-7 rounded-md flex items-center justify-center text-txt-3 hover:text-txt-1 hover:bg-subtle transition-colors text-lg">&times;</button>
      </div>
      <div x-show="historyList.length === 0" class="p-10 text-center text-txt-4">
        <div class="text-4xl mb-3 opacity-40">📭</div>
        <p class="text-sm" x-text="t('noHistory')"></p>
      </div>
      <div class="divide-y divide-border">
        <template x-for="h in historyList" :key="h.id">
          <div class="p-4 hover:bg-blue-50/50 cursor-pointer transition-colors" @click="loadHistory(h)">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm font-medium text-txt-1 truncate max-w-[200px]" x-text="h.fileName || t('textInput')"></span>
              <span class="text-xs text-txt-4" x-text="formatDate(h.timestamp)"></span>
            </div>
            <div class="flex items-center gap-2 text-xs text-txt-3 mb-2">
              <span class="badge bg-blue-50 text-blue-600" x-text="h.rounds + ' ' + t('rounds')"></span>
              <span class="truncate" x-text="h.agentA.model + ' vs ' + h.agentB.model"></span>
            </div>
            <div class="flex items-center gap-1.5">
              <button @click.stop="exportHistory(h, 'md')" class="btn btn-ghost px-2 py-0.5 text-xs">📄 MD</button>
              <button @click.stop="exportHistory(h, 'json')" class="btn btn-ghost px-2 py-0.5 text-xs">{ } JSON</button>
              <button @click.stop="deleteHistory(h.id)" class="btn btn-red px-2 py-0.5 text-xs ml-auto">🗑</button>
            </div>
          </div>
        </template>
      </div>
      <div x-show="historyList.length > 0" class="p-4 border-t border-border sticky bottom-0 bg-white">
        <button @click="clearAllHistory()" class="w-full btn btn-red px-3 py-2 text-sm" x-text="t('clearAll')"></button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <main class="max-w-6xl mx-auto px-6 py-6">

    <!-- Error -->
    <div x-show="error" x-cloak x-transition class="mb-4 bg-red-50 border border-red-200 rounded-lg px-4 py-3 flex items-center justify-between">
      <span class="text-red-600 text-sm">⚠️ <span x-text="error"></span></span>
      <button @click="error = ''" class="text-red-400 hover:text-red-600">&times;</button>
    </div>

    <!-- Upload Zone -->
    <section class="card p-8 text-center cursor-pointer mb-5 transition-all hover:border-blue-300 hover:shadow-sm"
      @click="$refs.fileInput.click()"
      @dragover.prevent="$el.classList.add('border-blue-400','bg-blue-50/30')"
      @dragleave.prevent="$el.classList.remove('border-blue-400','bg-blue-50/30')"
      @drop.prevent="$el.classList.remove('border-blue-400','bg-blue-50/30'); handleFileDrop($event)">
      <input type="file" x-ref="fileInput" class="hidden"
             accept=".pdf,.py,.txt,.md,.csv,.json,.js,.ts,.java,.cpp,.c,.h,.go,.rs,.rb,.php,.html,.css,.yaml,.yml,.toml,.xml,.sh,.sql"
             @change="handleFileSelect($event)">
      <div x-show="!fileName">
        <div class="text-4xl mb-3">📎</div>
        <p class="text-base font-semibold text-txt-2" x-text="t('dragDrop')"></p>
        <p class="text-sm text-txt-4 mt-1" x-text="t('supportedFormats')"></p>
      </div>
      <div x-show="fileName" x-cloak>
        <div class="text-3xl mb-2">📄</div>
        <p class="text-base font-semibold text-blue-600" x-text="fileName"></p>
        <p class="text-sm text-txt-3" x-text="formatSize(fileSize)"></p>
        <p class="text-xs text-txt-4 mt-1" x-text="t('clickReplace')"></p>
      </div>
    </section>

    <!-- Feature tags -->
    <div class="flex flex-wrap gap-2 mb-5">
      <span class="badge bg-violet-50 text-violet-600">📄 PDF</span>
      <span class="badge bg-amber-50 text-amber-600">💻 Code</span>
      <span class="badge bg-green-50 text-green-600">📝 Text</span>
      <span class="badge bg-blue-50 text-blue-600">🤖 Multi-Agent</span>
      <span class="badge bg-rose-50 text-rose-600">⚡ Stream</span>
    </div>

    <!-- Config -->
    <section class="card mb-5 overflow-hidden">
      <button @click="showConfig = !showConfig" class="w-full flex items-center justify-between px-5 py-3.5 hover:bg-subtle/50 transition-colors">
        <span class="font-semibold text-txt-2 text-sm">⚙️ <span x-text="t('llmConfig')"></span></span>
        <svg class="w-4 h-4 text-txt-4 transition-transform duration-200" :class="showConfig && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div x-show="showConfig" x-collapse class="px-5 pb-5 space-y-4">
        <div class="flex gap-5 border-b border-border -mx-5 px-5 mb-1">
          <button @click="configTab = 'api'" class="pb-2 text-sm font-medium transition-colors" :class="configTab === 'api' ? 'text-txt-1 border-b-2 border-blue-500' : 'text-txt-3 border-b-2 border-transparent hover:text-txt-2'" x-text="t('apiSettings')"></button>
          <button @click="configTab = 'prompts'" class="pb-2 text-sm font-medium transition-colors" :class="configTab === 'prompts' ? 'text-txt-1 border-b-2 border-blue-500' : 'text-txt-3 border-b-2 border-transparent hover:text-txt-2'" x-text="t('promptEditor')"></button>
        </div>

        <div x-show="configTab === 'api'" class="space-y-4">
          <div class="space-y-2">
            <h3 class="text-xs font-bold text-blue-600 flex items-center gap-2 uppercase tracking-wider">
              <span class="w-2 h-2 rounded-full bg-blue-500"></span> Agent A — <span x-text="t('suggester')"></span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
              <input type="text" x-model="configA.baseUrl" placeholder="https://api.openai.com/v1" class="input-box w-full px-3 py-2 text-sm">
              <input type="password" x-model="configA.apiKey" placeholder="sk-..." class="input-box w-full px-3 py-2 text-sm">
              <input type="text" x-model="configA.model" placeholder="gpt-4o" class="input-box w-full px-3 py-2 text-sm">
            </div>
          </div>
          <div class="space-y-2">
            <h3 class="text-xs font-bold text-rose-500 flex items-center gap-2 uppercase tracking-wider">
              <span class="w-2 h-2 rounded-full bg-rose-500"></span> Agent B — <span x-text="t('critic')"></span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
              <input type="text" x-model="configB.baseUrl" placeholder="https://api.deepseek.com/v1" class="input-box w-full px-3 py-2 text-sm">
              <input type="password" x-model="configB.apiKey" placeholder="sk-..." class="input-box w-full px-3 py-2 text-sm">
              <input type="text" x-model="configB.model" placeholder="deepseek-chat" class="input-box w-full px-3 py-2 text-sm">
            </div>
          </div>
          <div class="flex items-end gap-3 flex-wrap">
            <div>
              <label class="text-xs text-txt-3 mb-1 block font-medium" x-text="t('maxRounds')"></label>
              <input type="number" x-model.number="maxRounds" min="2" max="20" class="input-box w-20 px-3 py-2 text-sm">
            </div>
            <button @click="saveConfig()" class="btn btn-blue px-5 py-2 flex items-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <span x-text="t('saveConfig')"></span>
            </button>
            <span x-show="configSaved" x-transition class="text-green-600 text-sm font-medium">✓ <span x-text="t('saved')"></span></span>
          </div>
        </div>

        <div x-show="configTab === 'prompts'" class="space-y-3">
          <p class="text-xs text-txt-4 bg-subtle rounded-lg px-3 py-2" x-text="t('promptHint')"></p>
          <div class="space-y-1">
            <div class="flex items-center justify-between">
              <label class="text-xs font-bold text-blue-600 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-blue-500"></span> Agent A — <span x-text="t('suggester')"></span></label>
              <button @click="promptA = defaultPromptA()" class="text-xs text-txt-4 hover:text-txt-2" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptA" rows="4" class="prompt-textarea input-box w-full px-3 py-2 text-sm resize-y"></textarea>
          </div>
          <div class="space-y-1">
            <div class="flex items-center justify-between">
              <label class="text-xs font-bold text-rose-500 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-rose-500"></span> Agent B — <span x-text="t('critic')"></span></label>
              <button @click="promptB = defaultPromptB()" class="text-xs text-txt-4 hover:text-txt-2" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptB" rows="4" class="prompt-textarea input-box w-full px-3 py-2 text-sm resize-y"></textarea>
          </div>
          <div class="space-y-1">
            <div class="flex items-center justify-between">
              <label class="text-xs font-bold text-green-600 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500"></span> <span x-text="t('consensusPrompt')"></span></label>
              <button @click="promptConsensus = defaultPromptConsensus()" class="text-xs text-txt-4 hover:text-txt-2" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptConsensus" rows="3" class="prompt-textarea input-box w-full px-3 py-2 text-sm resize-y"></textarea>
          </div>
          <div class="flex items-center gap-3">
            <button @click="saveConfig()" class="btn btn-blue px-5 py-2 flex items-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <span x-text="t('savePrompts')"></span>
            </button>
            <button @click="resetAllPrompts()" class="btn btn-ghost px-4 py-2" x-text="t('resetAll')"></button>
            <span x-show="configSaved" x-transition class="text-green-600 text-sm font-medium">✓ <span x-text="t('saved')"></span></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Direct text input -->
    <section class="card mb-5 overflow-hidden">
      <button @click="showTextInput = !showTextInput" class="w-full flex items-center justify-between px-5 py-3.5 hover:bg-subtle/50 transition-colors">
        <span class="font-semibold text-txt-2 text-sm">✏️ <span x-text="t('directInput')"></span></span>
        <svg class="w-4 h-4 text-txt-4 transition-transform duration-200" :class="showTextInput && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div x-show="showTextInput" x-collapse class="px-5 pb-5">
        <textarea x-model="directText" rows="4" :placeholder="t('directInputHint')" class="input-box w-full px-3 py-2 text-sm resize-y"></textarea>
        <button @click="applyDirectText()" class="mt-2 btn btn-ghost px-4 py-1.5 text-sm flex items-center gap-1.5">
          <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          <span x-text="t('applyText')"></span>
        </button>
      </div>
    </section>

    <!-- Action buttons -->
    <div class="flex justify-center gap-3 mb-6">
      <button x-show="!isDebating" @click="startDebate()" :disabled="!canStart"
        class="btn btn-blue px-8 py-2.5 text-base flex items-center gap-2 shadow-sm shadow-blue-500/20 disabled:shadow-none">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span x-text="t('startDebate')"></span>
      </button>
      <button x-show="isDebating" @click="abortDebate()" class="btn btn-ghost px-8 py-2.5 text-base flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
        <span x-text="t('stopDebate')"></span>
      </button>
      <button x-show="!isDebating && messages.length > 0 && consensus" @click="exportCurrentDebate()" class="btn btn-ghost px-6 py-2.5 text-base flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        <span x-text="t('export')"></span>
      </button>
    </div>

    <!-- ═══════════════ DEBATE ARENA ═══════════════ -->
    <section x-show="messages.length > 0" x-cloak class="mb-6">

      <!-- Round + progress -->
      <div class="flex items-center justify-center gap-3 mb-4">
        <div x-show="currentRound > 0" class="badge bg-subtle text-txt-2 border border-border">
          <svg class="w-3.5 h-3.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          <span x-text="t('round')"></span> <span x-text="currentRound"></span>
        </div>
        <div x-show="isDebating" class="flex items-center gap-1">
          <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>
      </div>
      <div x-show="isDebating" class="max-w-xs mx-auto mb-4">
        <div class="progress-shimmer" :style="'width:' + Math.min((currentRound / maxRounds) * 100, 100) + '%'"></div>
      </div>

      <!-- Two Windows -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

        <!-- Agent A Window -->
        <div class="card overflow-hidden">
          <div class="flex items-center gap-2.5 px-4 py-3 bg-blue-50 border-b border-blue-100">
            <div class="w-7 h-7 rounded-md bg-blue-500 flex items-center justify-center text-white text-xs font-bold">A</div>
            <div class="flex-1 min-w-0">
              <h3 class="text-sm font-bold text-blue-700">Agent A</h3>
              <p class="text-[10px] text-blue-400 uppercase tracking-wider" x-text="t('suggester')"></p>
            </div>
            <span x-show="isDebating && agentAMessages.length > 0" class="badge bg-blue-100 text-blue-600 text-[10px]">
              <span class="w-1.5 h-1.5 rounded-full bg-blue-500" style="animation:pulse 1.5s infinite"></span>
              streaming
            </span>
          </div>
          <div class="p-4 space-y-3 max-h-[60vh] overflow-y-auto">
            <template x-for="(msg, idx) in agentAMessages" :key="'a-'+idx">
              <div class="bubble bubble-a slide-l md-content" x-html="renderMarkdown(msg.content)"></div>
            </template>
            <div x-show="agentAMessages.length === 0" class="text-center py-10 text-txt-4 text-sm">
              <div class="text-2xl mb-2 opacity-30">💬</div>
              <span x-text="lang === 'zh' ? '等待辩论开始...' : 'Waiting for debate...'"></span>
            </div>
          </div>
        </div>

        <!-- Agent B Window -->
        <div class="card overflow-hidden">
          <div class="flex items-center gap-2.5 px-4 py-3 bg-rose-50 border-b border-rose-100">
            <div class="w-7 h-7 rounded-md bg-rose-500 flex items-center justify-center text-white text-xs font-bold">B</div>
            <div class="flex-1 min-w-0">
              <h3 class="text-sm font-bold text-rose-700">Agent B</h3>
              <p class="text-[10px] text-rose-400 uppercase tracking-wider" x-text="t('critic')"></p>
            </div>
            <span x-show="isDebating && agentBMessages.length > 0" class="badge bg-rose-100 text-rose-600 text-[10px]">
              <span class="w-1.5 h-1.5 rounded-full bg-rose-500" style="animation:pulse 1.5s infinite"></span>
              streaming
            </span>
          </div>
          <div class="p-4 space-y-3 max-h-[60vh] overflow-y-auto">
            <template x-for="(msg, idx) in agentBMessages" :key="'b-'+idx">
              <div class="bubble bubble-b slide-r md-content" x-html="renderMarkdown(msg.content)"></div>
            </template>
            <div x-show="agentBMessages.length === 0" class="text-center py-10 text-txt-4 text-sm">
              <div class="text-2xl mb-2 opacity-30">💬</div>
              <span x-text="lang === 'zh' ? '等待辩论开始...' : 'Waiting for debate...'"></span>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- Consensus -->
    <section x-show="consensus" x-cloak class="fade-up mb-6">
      <div class="card overflow-hidden">
        <div class="flex items-center gap-2.5 px-5 py-3.5 bg-green-50 border-b border-green-100">
          <div class="w-7 h-7 rounded-md bg-green-500 flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <h2 class="text-sm font-bold text-green-700" x-text="t('consensusResult')"></h2>
        </div>
        <div class="p-5 md-content text-sm" x-html="renderMarkdown(consensus)"></div>
      </div>
    </section>

    <footer class="text-center text-xs text-txt-4 py-6 border-t border-border mt-8">
      DebateAI — <span x-text="t('footerNote')"></span>
    </footer>
  </main>

  <script>
    const I18N = {
      zh: {
        subtitle: '两个 AI 互相挑刺，找到最优解',
        history: '历史', debateHistory: '📜 辩论历史', noHistory: '暂无历史记录',
        clearAll: '🗑 清空所有历史', textInput: '文本输入', rounds: '轮',
        dragDrop: '拖拽或点击上传文件', supportedFormats: '支持 PDF / 代码 / 文本 / Markdown 等',
        clickReplace: '点击或拖拽替换文件',
        llmConfig: 'LLM 配置', apiSettings: 'API 设置', promptEditor: 'Prompt 编辑器',
        suggester: '建议者', critic: '批评者', maxRounds: '最大轮次',
        saveConfig: '保存配置', saved: '已保存', savePrompts: '保存 Prompt',
        promptHint: '自定义 Agent 的系统提示词，控制辩论风格和角色行为。',
        reset: '重置', resetAll: '全部重置', consensusPrompt: '共识总结 Prompt',
        directInput: '直接输入文本', directInputHint: '粘贴论文摘要、代码片段或任何文本...',
        applyText: '使用此文本', startDebate: '开始辩论', stopDebate: '停止辩论', export: '导出',
        round: '第', consensusResult: '共识结论', footerNote: '纯前端，无需后端。API Key 仅存储在浏览器本地。',
        confirmClearHistory: '确定清空所有历史记录？', confirmDeleteItem: '确定删除此记录？',
      },
      en: {
        subtitle: 'Two AIs debate to find the best solution',
        history: 'History', debateHistory: '📜 Debate History', noHistory: 'No history yet',
        clearAll: '🗑 Clear All', textInput: 'Text Input', rounds: 'rounds',
        dragDrop: 'Drag & drop or click to upload', supportedFormats: 'Supports PDF / Code / Text / Markdown etc.',
        clickReplace: 'Click or drag to replace',
        llmConfig: 'LLM Config', apiSettings: 'API Settings', promptEditor: 'Prompt Editor',
        suggester: 'Suggester', critic: 'Critic', maxRounds: 'Max Rounds',
        saveConfig: 'Save Config', saved: 'Saved', savePrompts: 'Save Prompts',
        promptHint: 'Customize agent system prompts to control debate style and role behavior.',
        reset: 'Reset', resetAll: 'Reset All', consensusPrompt: 'Consensus Summary Prompt',
        directInput: 'Direct Text Input', directInputHint: 'Paste an abstract, code snippet, or any text...',
        applyText: 'Use This Text', startDebate: 'Start Debate', stopDebate: 'Stop Debate', export: 'Export',
        round: 'Round', consensusResult: 'Consensus', footerNote: 'Pure frontend, no backend needed. API keys stored locally only.',
        confirmClearHistory: 'Clear all history?', confirmDeleteItem: 'Delete this record?',
      }
    };
    if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    if (typeof marked !== 'undefined') marked.setOptions({
      highlight: (code, lang) => { if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value; return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code; },
      breaks: true, gfm: true,
    });

    function debateApp() {
      return {
        lang: 'zh',
        t(key) { return (I18N[this.lang] || I18N.zh)[key] || key; },
        toggleLang() { this.lang = this.lang === 'zh' ? 'en' : 'zh'; localStorage.setItem('debateai_lang', this.lang); },
        fileName: '', fileSize: 0, fileContent: '', directText: '', showTextInput: false,
        configA: { baseUrl: '', apiKey: '', model: '' }, configB: { baseUrl: '', apiKey: '', model: '' },
        maxRounds: 6, showConfig: true, configSaved: false, configTab: 'api',
        promptA: '', promptB: '', promptConsensus: '',
        defaultPromptA() { return this.lang === 'zh' ? `你是一个专业的分析专家（建议者）。你的职责是：\n1. 仔细分析用户提供的材料（论文/代码/文本）\n2. 提出具体、可操作的改进建议\n3. 如果涉及代码，提供改进后的代码\n4. 输出结构化的分析，包含：问题分析、改进建议、代码示例\n5. 用中文回答` : `You are a professional analyst (Suggester). Your responsibilities:\n1. Carefully analyze the user's material (paper/code/text)\n2. Propose specific, actionable improvements\n3. If code is involved, provide improved code\n4. Output structured analysis: problem analysis, improvement suggestions, code examples`; },
        defaultPromptB() { return this.lang === 'zh' ? `你是一个严格的审查者（批评者）。你的职责是：\n1. 仔细审查 Agent A 的建议，找出逻辑漏洞、技术错误、遗漏点\n2. 提出你的替代方案或补充建议\n3. 不要无理由反对——如果 A 的建议确实好，可以表示认可\n4. 如果发现问题，详细说明问题所在并给出你的方案\n5. 用中文回答` : `You are a rigorous reviewer (Critic). Your responsibilities:\n1. Carefully review Agent A's suggestions, finding logical flaws, technical errors, and omissions\n2. Propose alternatives or supplementary suggestions\n3. Don't disagree without reason — if A's suggestion is good, acknowledge it\n4. If you find issues, explain them in detail and provide your solution`; },
        defaultPromptConsensus() { return this.lang === 'zh' ? `你是总结者。根据以下辩论记录，提炼双方共识，输出最终结论和改进代码。用 Markdown 格式。` : `You are a summarizer. Based on the debate record below, extract the consensus between both parties, output final conclusions and improved code. Use Markdown format.`; },
        isDebating: false, messages: [], consensus: '', currentRound: 0, error: '', abortController: null,
        showHistory: false, historyList: [],
        get canStart() { return (this.fileContent || this.directText) && this.configA.baseUrl && this.configA.apiKey && this.configA.model && this.configB.baseUrl && this.configB.apiKey && this.configB.model; },
        get agentAMessages() { return this.messages.filter(m => m.agent === 'A'); },
        get agentBMessages() { return this.messages.filter(m => m.agent === 'B'); },
        init() { this.lang = localStorage.getItem('debateai_lang') || 'zh'; this.loadConfig(); this.loadHistoryList(); if (!this.promptA) this.promptA = this.defaultPromptA(); if (!this.promptB) this.promptB = this.defaultPromptB(); if (!this.promptConsensus) this.promptConsensus = this.defaultPromptConsensus(); },
        async handleFileDrop(e) { const f = e.dataTransfer.files[0]; if (f) await this.processFile(f); },
        async handleFileSelect(e) { const f = e.target.files[0]; if (f) await this.processFile(f); },
        async processFile(file) {
          const ext = file.name.split('.').pop().toLowerCase();
          if (!['pdf','py','txt','md','csv','json','js','ts','java','cpp','c','h','go','rs','rb','php','html','css','yaml','yml','toml','xml','sh','sql'].includes(ext)) { this.error = this.lang === 'zh' ? '不支持的文件格式' : 'Unsupported format'; return; }
          this.fileName = file.name; this.fileSize = file.size; this.error = ''; this.directText = '';
          this.fileContent = ext === 'pdf' ? await this.parsePDF(file) : await this.readText(file);
        },
        readText(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = () => rej(new Error('Read failed')); r.readAsText(file); }); },
        async parsePDF(file) { const buf = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({ data: buf }).promise; let t = ''; for (let i = 1; i <= pdf.numPages; i++) { const p = await pdf.getPage(i); const c = await p.getTextContent(); t += c.items.map(it => it.str).join(' ') + '\n\n'; } return t.trim(); },
        formatSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; return (b / 1048576).toFixed(1) + ' MB'; },
        applyDirectText() { if (this.directText.trim()) { this.fileContent = this.directText.trim(); this.fileName = this.lang === 'zh' ? '直接输入文本' : 'Direct text input'; this.fileSize = this.fileContent.length; } },
        saveConfig() {
          localStorage.setItem('debateai_config', JSON.stringify({ configA: this.configA, configB: this.configB, maxRounds: this.maxRounds, promptA: this.promptA, promptB: this.promptB, promptConsensus: this.promptConsensus }));
          this.configSaved = true; setTimeout(() => this.configSaved = false, 2000);
        },
        loadConfig() { try { const d = JSON.parse(localStorage.getItem('debateai_config')); if (d) { if (d.configA) this.configA = { ...this.configA, ...d.configA }; if (d.configB) this.configB = { ...this.configB, ...d.configB }; if (d.maxRounds) this.maxRounds = d.maxRounds; if (d.promptA) this.promptA = d.promptA; if (d.promptB) this.promptB = d.promptB; if (d.promptConsensus) this.promptConsensus = d.promptConsensus; } } catch (e) {} },
        resetAllPrompts() { this.promptA = this.defaultPromptA(); this.promptB = this.defaultPromptB(); this.promptConsensus = this.defaultPromptConsensus(); },
        renderMarkdown(t) { if (!t) return ''; try { return marked.parse(t); } catch (e) { return t.replace(/</g, '&lt;').replace(/>/g, '&gt;'); } },
        async startDebate() {
          if (!this.canStart) return; const content = this.fileContent; if (!content) return;
          this.isDebating = true; this.messages = []; this.consensus = ''; this.currentRound = 0; this.error = ''; this.abortController = new AbortController();
          try {
            this.currentRound = 1;
            const hA = [{ role: 'system', content: this.promptA }, { role: 'user', content: (this.lang === 'zh' ? '请分析以下材料并提出改进建议：\n\n' : 'Please analyze the following material and suggest improvements:\n\n') + content }];
            const mA1 = this.addMessage('A', '', 1); await this.callLLM(this.configA, hA, ch => this.appendToMessage(mA1, ch));
            const hB = [{ role: 'system', content: this.promptB }, { role: 'user', content: (this.lang === 'zh' ? '以下是一份材料和 Agent A 的分析建议。请审查并指出问题：\n\n材料：' : 'Here is a material and Agent A\'s analysis. Please review and point out issues:\n\nMaterial: ') + content + (this.lang === 'zh' ? '\n\nAgent A 的建议：' : '\n\nAgent A\'s suggestions: ') + mA1.content }];
            const mB1 = this.addMessage('B', '', 1); await this.callLLM(this.configB, hB, ch => this.appendToMessage(mB1, ch));
            if (this.detectConsensus(mB1.content)) { await this.extractConsensus(); return; }
            let pA = mA1, pB = mB1, hhA = [...hA], hhB = [...hB];
            for (let r = 2; r <= this.maxRounds; r++) {
              this.currentRound = r;
              hhA.push({ role: 'assistant', content: pA.content }, { role: 'user', content: (this.lang === 'zh' ? 'Agent B 对你的建议提出了以下批评，请回应：\n\n' : 'Agent B criticized your suggestions. Please respond:\n\n') + pB.content });
              const mA = this.addMessage('A', '', r); await this.callLLM(this.configA, hhA, ch => this.appendToMessage(mA, ch)); pA = mA;
              hhB.push({ role: 'assistant', content: pB.content }, { role: 'user', content: (this.lang === 'zh' ? 'Agent A 回应了你的批评：\n\n' : 'Agent A responded to your criticism:\n\n') + pA.content + (this.lang === 'zh' ? '\n\n请继续审查或表示同意。' : '\n\nPlease continue reviewing or express agreement.') });
              const mB = this.addMessage('B', '', r); await this.callLLM(this.configB, hhB, ch => this.appendToMessage(mB, ch)); pB = mB;
              if (this.detectConsensus(pB.content)) break;
            }
            await this.extractConsensus();
          } catch (e) { this.error = e.name === 'AbortError' ? (this.lang === 'zh' ? '辩论已中止' : 'Debate aborted') : `Error: ${e.message}`; }
          finally { this.isDebating = false; this.abortController = null; }
        },
        async extractConsensus() {
          const s = this.buildDebateSummary(); const c = this.addMessage('consensus', '', 0);
          await this.callLLM(this.configA, [{ role: 'system', content: this.promptConsensus }, { role: 'user', content: s }], ch => this.appendToMessage(c, ch));
          this.consensus = c.content; this.saveToHistory();
        },
        buildDebateSummary() { let s = (this.lang === 'zh' ? '辩论记录：\n\n' : 'Debate Record:\n\n'); for (const m of this.messages) { const r = m.agent === 'A' ? 'Agent A' : m.agent === 'B' ? 'Agent B' : 'Consensus'; s += `## ${this.lang === 'zh' ? '第' : 'Round '}${m.round}${this.lang === 'zh' ? '轮' : ''} - ${r}\n\n${m.content}\n\n---\n\n`; } return s; },
        addMessage(agent, content, round) { const m = { agent, content, round, id: Date.now() + Math.random() }; this.messages.push(m); this.$nextTick(() => this.scrollToBottom()); return m; },
        appendToMessage(msg, chunk) { msg.content += chunk; if (!this._sth) { this._sth = true; requestAnimationFrame(() => { this.scrollToBottom(); this._sth = false; }); } },
        scrollToBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); },
        async callLLM(config, messages, onChunk) {
          const signal = this.abortController ? this.abortController.signal : undefined;
          const resp = await fetch(config.baseUrl.replace(/\/+$/, '') + '/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKey}` }, body: JSON.stringify({ model: config.model, messages, stream: true }), signal });
          if (!resp.ok) { const t = await resp.text().catch(() => ''); throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`); }
          const reader = resp.body.getReader(), dec = new TextDecoder(); let buf = '';
          while (true) { const { done, value } = await reader.read(); if (done) break; buf += dec.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop() || ''; for (const l of lines) { const tr = l.trim(); if (!tr || !tr.startsWith('data:')) continue; const d = tr.slice(5).trim(); if (d === '[DONE]') return; try { const j = JSON.parse(d); const dt = j.choices && j.choices[0] && j.choices[0].delta; if (dt && dt.content) onChunk(dt.content); } catch (e) {} } }
        },
        detectConsensus(text) { return ['同意','认可','达成共识','没有异议','你说得对','有道理','agree','consensus','我同意','完全同意','基本同意','I agree','no objections','common ground'].some(k => text.toLowerCase().includes(k.toLowerCase())); },
        abortDebate() { if (this.abortController) this.abortController.abort(); },
        loadHistoryList() { try { this.historyList = JSON.parse(localStorage.getItem('debateai_history')) || []; } catch (e) { this.historyList = []; } },
        saveToHistory() {
          const r = { id: Date.now(), timestamp: new Date().toISOString(), fileName: this.fileName, fileSize: this.fileSize, agentA: { model: this.configA.model, baseUrl: this.configA.baseUrl }, agentB: { model: this.configB.model, baseUrl: this.configB.baseUrl }, rounds: this.currentRound, messages: JSON.parse(JSON.stringify(this.messages)), consensus: this.consensus, contentPreview: this.fileContent.slice(0, 500) };
          this.historyList.unshift(r); if (this.historyList.length > 50) this.historyList = this.historyList.slice(0, 50);
          localStorage.setItem('debateai_history', JSON.stringify(this.historyList));
        },
        loadHistory(h) { this.messages = h.messages || []; this.consensus = h.consensus || ''; this.currentRound = h.rounds || 0; this.fileName = h.fileName || ''; this.showHistory = false; this.$nextTick(() => this.scrollToBottom()); },
        deleteHistory(id) { if (!confirm(this.t('confirmDeleteItem'))) return; this.historyList = this.historyList.filter(h => h.id !== id); localStorage.setItem('debateai_history', JSON.stringify(this.historyList)); },
        clearAllHistory() { if (!confirm(this.t('confirmClearHistory'))) return; this.historyList = []; localStorage.removeItem('debateai_history'); },
        formatDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString(this.lang === 'zh' ? 'zh-CN' : 'en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); },
        exportCurrentDebate() { if (!this.messages.length) return; this.exportHistory({ fileName: this.fileName, timestamp: new Date().toISOString(), agentA: { model: this.configA.model }, agentB: { model: this.configB.model }, rounds: this.currentRound, messages: this.messages, consensus: this.consensus }, 'md'); },
        exportHistory(h, fmt) {
          let c, m, e;
          if (fmt === 'json') { c = JSON.stringify(h, null, 2); m = 'application/json'; e = 'json'; }
          else { c = this.buildExportMD(h); m = 'text/markdown'; e = 'md'; }
          const blob = new Blob([c], { type: m }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `debate-${h.fileName || 'text'}-${h.id || Date.now()}.${e}`; a.click(); URL.revokeObjectURL(url);
        },
        buildExportMD(h) {
          let md = `# DebateAI ${this.lang === 'zh' ? '辩论记录' : 'Debate Record'}\n\n`;
          md += `- **${this.lang === 'zh' ? '文件' : 'File'}**: ${h.fileName || 'N/A'}\n- **${this.lang === 'zh' ? '日期' : 'Date'}**: ${new Date(h.timestamp).toLocaleString()}\n- **Agent A**: ${h.agentA?.model || 'N/A'}\n- **Agent B**: ${h.agentB?.model || 'N/A'}\n- **${this.lang === 'zh' ? '轮次' : 'Rounds'}**: ${h.rounds}\n\n---\n\n`;
          for (const m of (h.messages || [])) { const r = m.agent === 'A' ? '🟦 Agent A' : m.agent === 'B' ? '🟥 Agent B' : '🤝 Consensus'; md += `## ${r} — ${this.lang === 'zh' ? '第' : 'Round '}${m.round}${this.lang === 'zh' ? '轮' : ''}\n\n${m.content}\n\n---\n\n`; }
          if (h.consensus) md += `## 🤝 ${this.lang === 'zh' ? '共识结论' : 'Consensus'}\n\n${h.consensus}\n`;
          return md;
        },
      };
    }
  </script>

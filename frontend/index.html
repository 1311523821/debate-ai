<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DebateAI — 双模型对抗辩论平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: { 50: '#FFFDF8', 100: '#FFF9ED', 200: '#FFF3DB', 300: '#FFE8C0', 400: '#FFD89E' },
            warm: { 50: '#FEFCF7', 100: '#FDF8EE', 200: '#F8F0DD', 300: '#F0E4C8', 400: '#D4C4A0', 500: '#B8A882', 600: '#9C8E6A', 700: '#7A6E50', 800: '#5C523A' },
            mi: { DEFAULT: '#FF6A00', light: '#FF8C38', dark: '#E05500', glow: '#FF6A0015' },
            agentA: { DEFAULT: '#FF7A1A', bubble: '#FFF5EB', light: '#FF9A4A', dark: '#E06600', border: '#FFD4AA' },
            agentB: { DEFAULT: '#FFAB40', bubble: '#FFF8ED', light: '#FFCC80', dark: '#E09020', border: '#FFE0AA' },
            consensus: { DEFAULT: '#4CAF50', bg: '#F0FAF0', border: '#A5D6A7', light: '#66BB6A' },
          }
        }
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <style>
    body { background: #FFFDF8; color: #5C523A; }

    @keyframes fadeInUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    .fade-in-up { animation: fadeInUp .35s ease-out forwards }
    @keyframes pulse-dot { 0%,80%,100% { opacity:.3; transform:scale(.8) } 40% { opacity:1; transform:scale(1) } }
    .typing-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#B8A882; margin:0 2px; animation:pulse-dot 1.4s infinite ease-in-out both }
    .typing-dot:nth-child(1) { animation-delay:-.32s }
    .typing-dot:nth-child(2) { animation-delay:-.16s }
    .upload-zone.drag-over { border-color:#FF6A00!important; background:rgba(255,106,0,.06)!important }

    .md-content { color: #5C523A; }
    .md-content h1,.md-content h2,.md-content h3 { font-weight:700; margin-top:.8em; margin-bottom:.4em; color: #3D3520; }
    .md-content h1 { font-size:1.4em } .md-content h2 { font-size:1.2em } .md-content h3 { font-size:1.05em }
    .md-content p { margin-bottom:.6em; line-height:1.7 }
    .md-content ul,.md-content ol { margin-left:1.5em; margin-bottom:.6em }
    .md-content li { margin-bottom:.2em }
    .md-content code { background:#FFF3DB; padding:.12em .35em; border-radius:4px; font-size:.88em; color:#E05500 }
    .md-content pre { background:#FFF9ED; border:1px solid #FFE8C0; border-radius:10px; padding:.8em; overflow-x:auto; margin:.6em 0 }
    .md-content pre code { background:transparent; padding:0; font-size:.83em; line-height:1.6; color: #5C523A }
    .md-content blockquote { border-left:3px solid #FF6A00; padding-left:.8em; color:#9C8E6A; margin:.6em 0 }
    .md-content table { border-collapse:collapse; width:100%; margin:.6em 0 }
    .md-content th,.md-content td { border:1px solid #FFE8C0; padding:.4em .6em; text-align:left }
    .md-content th { background:#FFF3DB; font-weight:600; color:#7A6E50 }
    .md-content strong { color: #3D3520; }
    .md-content a { color:#FF6A00; text-decoration:underline }

    ::-webkit-scrollbar { width:5px } ::-webkit-scrollbar-track { background:transparent }
    ::-webkit-scrollbar-thumb { background:#F0E4C8; border-radius:3px }
    ::-webkit-scrollbar-thumb:hover { background:#D4C4A0 }
    .prompt-textarea { font-family:'Courier New',monospace; font-size:.8rem; line-height:1.5; tab-size:2 }
    .history-item:hover { background:rgba(255,106,0,.04) }
    .tab-active { border-bottom:2px solid #FF6A00; color:#3D3520 }
    .tab-inactive { border-bottom:2px solid transparent; color:#9C8E6A }
    .tab-inactive:hover { color:#7A6E50; border-bottom-color:#D4C4A0 }
    .mi-btn { background: linear-gradient(135deg, #FF6A00, #FF8C38); }
    .mi-btn:hover { background: linear-gradient(135deg, #E05500, #FF6A00); }
    .card { background:#FFFFFF; border:1px solid #FFE8C0; border-radius:16px; box-shadow: 0 1px 3px rgba(154,120,60,.06); }
    .card-header { border-bottom: 1px solid #FFF3DB; }
    .input-field { background:#FFFDF8; border:1px solid #FFE8C0; color:#5C523A; }
    .input-field::placeholder { color:#D4C4A0; }
    .input-field:focus { border-color:#FF6A00; box-shadow: 0 0 0 2px rgba(255,106,0,.12); outline:none; }
    .btn-subtle { background:#FFF3DB; border:1px solid #FFE8C0; color:#7A6E50; }
    .btn-subtle:hover { background:#FFE8C0; }
  </style>
</head>

<body class="min-h-screen" x-data="debateApp()" x-init="init()">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-cream-50/90 backdrop-blur-md border-b border-cream-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl mi-btn flex items-center justify-center text-white font-bold text-sm shadow-md shadow-mi/20">D</div>
        <div>
          <h1 class="text-lg font-bold text-warm-800">DebateAI</h1>
          <p class="text-warm-500 text-xs" x-text="t('subtitle')"></p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button @click="toggleLang()" class="px-2.5 py-1 text-xs rounded-lg btn-subtle transition-colors"
                x-text="lang === 'zh' ? 'EN' : '中文'"></button>
        <button @click="showHistory = !showHistory" class="relative px-2.5 py-1 text-xs rounded-lg btn-subtle transition-colors">
          📜 <span x-text="t('history')"></span>
          <span x-show="historyList.length > 0" class="absolute -top-1.5 -right-1.5 w-4 h-4 mi-btn rounded-full text-[10px] text-white flex items-center justify-center" x-text="historyList.length"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- History Sidebar -->
  <div x-show="showHistory" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
       class="fixed inset-0 z-40 bg-warm-800/20 backdrop-blur-sm" @click.self="showHistory = false">
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white border-l border-cream-200 overflow-y-auto shadow-2xl"
         x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
      <div class="p-4 border-b border-cream-200 flex items-center justify-between sticky top-0 bg-white z-10">
        <h2 class="text-lg font-bold text-warm-800" x-text="t('debateHistory')"></h2>
        <button @click="showHistory = false" class="text-warm-400 hover:text-warm-700 text-2xl leading-none">&times;</button>
      </div>
      <div x-show="historyList.length === 0" class="p-8 text-center text-warm-400">
        <div class="text-4xl mb-3">📭</div>
        <p x-text="t('noHistory')"></p>
      </div>
      <div class="divide-y divide-cream-200">
        <template x-for="(h, idx) in historyList" :key="h.id">
          <div class="history-item p-4 cursor-pointer transition-colors" @click="loadHistory(h)">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm font-medium text-warm-700 truncate max-w-[200px]" x-text="h.fileName || t('textInput')"></span>
              <span class="text-xs text-warm-400" x-text="formatDate(h.timestamp)"></span>
            </div>
            <div class="flex items-center gap-3 text-xs text-warm-500">
              <span x-text="h.rounds + ' ' + t('rounds')"></span><span>•</span>
              <span x-text="h.agentA.model + ' vs ' + h.agentB.model"></span>
            </div>
            <div class="flex items-center gap-2 mt-2">
              <button @click.stop="exportHistory(h, 'md')" class="px-2 py-0.5 text-xs rounded-md btn-subtle">📄 MD</button>
              <button @click.stop="exportHistory(h, 'json')" class="px-2 py-0.5 text-xs rounded-md btn-subtle">{ } JSON</button>
              <button @click.stop="deleteHistory(h.id)" class="px-2 py-0.5 text-xs rounded-md bg-red-50 border border-red-200 text-red-500 hover:bg-red-100 ml-auto">🗑</button>
            </div>
          </div>
        </template>
      </div>
      <div x-show="historyList.length > 0" class="p-4 border-t border-cream-200 sticky bottom-0 bg-white">
        <button @click="clearAllHistory()" class="w-full px-3 py-2 text-sm rounded-lg bg-red-50 border border-red-200 text-red-500 hover:bg-red-100 transition-colors" x-text="t('clearAll')"></button>
      </div>
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-4 py-5 space-y-4">

    <!-- Error -->
    <div x-show="error" x-cloak class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 flex items-center justify-between">
      <span class="text-red-600 text-sm">⚠️ <span x-text="error"></span></span>
      <button @click="error = ''" class="text-red-400 hover:text-red-600 text-xl leading-none">&times;</button>
    </div>

    <!-- Upload Zone -->
    <section class="upload-zone border-2 border-dashed border-cream-300 rounded-2xl p-6 text-center cursor-pointer transition-all hover:border-mi hover:bg-mi-glow"
      @click="$refs.fileInput.click()" @dragover.prevent="$el.classList.add('drag-over')" @dragleave.prevent="$el.classList.remove('drag-over')"
      @drop.prevent="$el.classList.remove('drag-over'); handleFileDrop($event)">
      <input type="file" x-ref="fileInput" class="hidden" accept=".pdf,.py,.txt,.md,.csv,.json,.js,.ts,.java,.cpp,.c,.h,.go,.rs,.rb,.php,.html,.css,.yaml,.yml,.toml,.xml,.sh,.sql" @change="handleFileSelect($event)">
      <div x-show="!fileName">
        <div class="text-3xl mb-2">📎</div>
        <p class="text-base font-medium text-warm-600" x-text="t('dragDrop')"></p>
        <p class="text-xs text-warm-400 mt-1" x-text="t('supportedFormats')"></p>
      </div>
      <div x-show="fileName" x-cloak>
        <div class="text-2xl mb-1">📄</div>
        <p class="text-base font-medium text-mi" x-text="fileName"></p>
        <p class="text-xs text-warm-500" x-text="formatSize(fileSize)"></p>
        <p class="text-xs text-warm-400 mt-1" x-text="t('clickReplace')"></p>
      </div>
    </section>

    <!-- Config -->
    <section class="card overflow-hidden">
      <button @click="showConfig = !showConfig" class="w-full flex items-center justify-between px-4 py-3 hover:bg-cream-100 transition-colors card-header">
        <span class="font-semibold text-warm-700 text-sm">⚙️ <span x-text="t('llmConfig')"></span></span>
        <svg class="w-4 h-4 text-warm-400 transition-transform" :class="showConfig && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div x-show="showConfig" x-collapse class="px-4 pb-4 space-y-4">
        <div class="flex gap-4 border-b border-cream-200 -mx-4 px-4 mb-1">
          <button @click="configTab = 'api'" class="pb-2 text-sm font-medium transition-colors" :class="configTab === 'api' ? 'tab-active' : 'tab-inactive'" x-text="t('apiSettings')"></button>
          <button @click="configTab = 'prompts'" class="pb-2 text-sm font-medium transition-colors" :class="configTab === 'prompts' ? 'tab-active' : 'tab-inactive'" x-text="t('promptEditor')"></button>
        </div>

        <div x-show="configTab === 'api'" class="space-y-4">
          <div class="space-y-2">
            <h3 class="text-xs font-semibold text-agentA-dark flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-agentA inline-block"></span> Agent A（<span x-text="t('suggester')"></span>）
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
              <input type="text" x-model="configA.baseUrl" placeholder="https://api.openai.com/v1" class="input-field w-full rounded-lg px-3 py-2 text-sm">
              <input type="password" x-model="configA.apiKey" placeholder="sk-..." class="input-field w-full rounded-lg px-3 py-2 text-sm">
              <input type="text" x-model="configA.model" placeholder="gpt-4o" class="input-field w-full rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <div class="space-y-2">
            <h3 class="text-xs font-semibold text-agentB-dark flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-agentB inline-block"></span> Agent B（<span x-text="t('critic')"></span>）
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
              <input type="text" x-model="configB.baseUrl" placeholder="https://api.deepseek.com/v1" class="input-field w-full rounded-lg px-3 py-2 text-sm">
              <input type="password" x-model="configB.apiKey" placeholder="sk-..." class="input-field w-full rounded-lg px-3 py-2 text-sm">
              <input type="text" x-model="configB.model" placeholder="deepseek-chat" class="input-field w-full rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <div class="flex items-end gap-3 flex-wrap">
            <div>
              <label class="text-xs text-warm-500 mb-1 block" x-text="t('maxRounds')"></label>
              <input type="number" x-model.number="maxRounds" min="2" max="20" class="input-field w-20 rounded-lg px-3 py-2 text-sm">
            </div>
            <button @click="saveConfig()" class="px-4 py-2 mi-btn rounded-lg text-sm font-medium text-white shadow-md shadow-mi/20 hover:shadow-mi/30 transition-all">
              💾 <span x-text="t('saveConfig')"></span>
            </button>
            <p x-show="configSaved" x-transition class="text-consensus text-sm self-center">✓ <span x-text="t('saved')"></span></p>
          </div>
        </div>

        <div x-show="configTab === 'prompts'" class="space-y-3">
          <p class="text-xs text-warm-400" x-text="t('promptHint')"></p>
          <div class="space-y-1">
            <div class="flex items-center justify-between">
              <label class="text-xs font-semibold text-agentA-dark flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-agentA inline-block"></span> Agent A — <span x-text="t('suggester')"></span></label>
              <button @click="promptA = defaultPromptA()" class="text-xs text-warm-400 hover:text-warm-600" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptA" rows="5" class="prompt-textarea input-field w-full rounded-lg px-3 py-2 text-sm resize-y"></textarea>
          </div>
          <div class="space-y-1">
            <div class="flex items-center justify-between">
              <label class="text-xs font-semibold text-agentB-dark flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-agentB inline-block"></span> Agent B — <span x-text="t('critic')"></span></label>
              <button @click="promptB = defaultPromptB()" class="text-xs text-warm-400 hover:text-warm-600" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptB" rows="5" class="prompt-textarea input-field w-full rounded-lg px-3 py-2 text-sm resize-y"></textarea>
          </div>
          <div class="space-y-1">
            <div class="flex items-center justify-between">
              <label class="text-xs font-semibold text-consensus flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-consensus inline-block"></span> <span x-text="t('consensusPrompt')"></span></label>
              <button @click="promptConsensus = defaultPromptConsensus()" class="text-xs text-warm-400 hover:text-warm-600" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptConsensus" rows="3" class="prompt-textarea input-field w-full rounded-lg px-3 py-2 text-sm resize-y"></textarea>
          </div>
          <div class="flex items-center gap-3">
            <button @click="saveConfig()" class="px-4 py-2 mi-btn rounded-lg text-sm font-medium text-white shadow-md shadow-mi/20">💾 <span x-text="t('savePrompts')"></span></button>
            <button @click="resetAllPrompts()" class="px-4 py-2 btn-subtle rounded-lg text-sm font-medium">↩ <span x-text="t('resetAll')"></span></button>
            <p x-show="configSaved" x-transition class="text-consensus text-sm">✓ <span x-text="t('saved')"></span></p>
          </div>
        </div>
      </div>
    </section>

    <!-- Direct text input -->
    <section class="card overflow-hidden">
      <button @click="showTextInput = !showTextInput" class="w-full flex items-center justify-between px-4 py-3 hover:bg-cream-100 transition-colors card-header">
        <span class="font-semibold text-warm-700 text-sm">✏️ <span x-text="t('directInput')"></span></span>
        <svg class="w-4 h-4 text-warm-400 transition-transform" :class="showTextInput && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div x-show="showTextInput" x-collapse class="px-4 pb-4">
        <textarea x-model="directText" rows="5" :placeholder="t('directInputHint')" class="input-field w-full rounded-lg px-3 py-2 text-sm resize-y"></textarea>
        <button @click="applyDirectText()" class="mt-2 px-4 py-1.5 btn-subtle rounded-lg text-sm transition-colors" x-text="t('applyText')"></button>
      </div>
    </section>

    <!-- Action buttons -->
    <div class="flex justify-center gap-3">
      <button x-show="!isDebating" @click="startDebate()" :disabled="!canStart"
        class="px-7 py-2.5 mi-btn disabled:opacity-40 disabled:cursor-not-allowed rounded-xl text-base font-semibold text-white transition-all shadow-lg shadow-mi/25 hover:shadow-mi/40 hover:scale-[1.02] active:scale-[0.98]">
        🚀 <span x-text="t('startDebate')"></span>
      </button>
      <button x-show="isDebating" @click="abortDebate()"
        class="px-7 py-2.5 bg-warm-200 hover:bg-warm-300 rounded-xl text-base font-semibold text-warm-700 transition-all border border-cream-300">
        ⏹ <span x-text="t('stopDebate')"></span>
      </button>
      <button x-show="!isDebating && messages.length > 0 && consensus" @click="exportCurrentDebate()"
        class="px-5 py-2.5 btn-subtle rounded-xl text-base font-semibold transition-all">
        📥 <span x-text="t('export')"></span>
      </button>
    </div>

    <!-- Debate Area -->
    <section x-show="messages.length > 0" x-cloak class="space-y-2">
      <div x-show="currentRound > 0" class="text-center text-xs text-warm-400">
        <span x-text="t('round')"></span> <span x-text="currentRound" class="text-warm-600 font-semibold"></span>
        <span x-show="isDebating" class="inline-block ml-2"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-2">
        <div class="space-y-2">
          <div class="flex items-center gap-2 mb-1 px-1">
            <span class="w-2 h-2 rounded-full bg-agentA"></span>
            <h3 class="text-xs font-semibold text-agentA-dark">Agent A（<span x-text="t('suggester')"></span>）</h3>
          </div>
          <template x-for="(msg, idx) in agentAMessages" :key="'a-'+idx">
            <div class="fade-in-up bg-agentA-bubble border border-agentA-border rounded-xl p-3 md-content text-sm"
                 x-html="renderMarkdown(msg.content)"></div>
          </template>
        </div>
        <div class="space-y-2">
          <div class="flex items-center gap-2 mb-1 px-1">
            <span class="w-2 h-2 rounded-full bg-agentB"></span>
            <h3 class="text-xs font-semibold text-agentB-dark">Agent B（<span x-text="t('critic')"></span>）</h3>
          </div>
          <template x-for="(msg, idx) in agentBMessages" :key="'b-'+idx">
            <div class="fade-in-up bg-agentB-bubble border border-agentB-border rounded-xl p-3 md-content text-sm"
                 x-html="renderMarkdown(msg.content)"></div>
          </template>
        </div>
      </div>
    </section>

    <!-- Consensus -->
    <section x-show="consensus" x-cloak class="fade-in-up bg-consensus-bg border border-consensus-border rounded-2xl p-5">
      <h2 class="text-base font-bold text-consensus mb-3 flex items-center gap-2">🤝 <span x-text="t('consensusResult')"></span></h2>
      <div class="md-content text-sm" x-html="renderMarkdown(consensus)"></div>
    </section>

    <footer class="text-center text-xs text-warm-400 py-4 border-t border-cream-200 mt-6">
      DebateAI — <span x-text="t('footerNote')"></span>
    </footer>
  </main>

  <script>
    const I18N = {
      zh: {
        subtitle: '两个 AI 互相挑刺，找到最优解',
        history: '历史', debateHistory: '📜 辩论历史', noHistory: '暂无历史记录',
        clearAll: '🗑 清空所有历史', textInput: '文本输入', rounds: '轮',
        dragDrop: '拖拽或点击上传文件', supportedFormats: '支持 PDF / 代码 / 文本 / Markdown 等',
        clickReplace: '点击或拖拽替换文件',
        llmConfig: 'LLM 配置', apiSettings: 'API 设置', promptEditor: 'Prompt 编辑器',
        suggester: '建议者', critic: '批评者', maxRounds: '最大轮次',
        saveConfig: '保存配置', saved: '已保存', savePrompts: '保存 Prompt',
        promptHint: '自定义 Agent 的系统提示词，控制辩论风格和角色行为。',
        reset: '重置', resetAll: '全部重置', consensusPrompt: '共识总结 Prompt',
        directInput: '直接输入文本', directInputHint: '粘贴论文摘要、代码片段或任何文本...',
        applyText: '✅ 使用此文本', startDebate: '开始辩论', stopDebate: '停止辩论', export: '导出',
        round: '第', consensusResult: '共识结论', footerNote: '纯前端，无需后端。API Key 仅存储在浏览器本地。',
        confirmClearHistory: '确定清空所有历史记录？', confirmDeleteItem: '确定删除此记录？',
      },
      en: {
        subtitle: 'Two AIs debate to find the best solution',
        history: 'History', debateHistory: '📜 Debate History', noHistory: 'No history yet',
        clearAll: '🗑 Clear All', textInput: 'Text Input', rounds: 'rounds',
        dragDrop: 'Drag & drop or click to upload', supportedFormats: 'Supports PDF / Code / Text / Markdown etc.',
        clickReplace: 'Click or drag to replace',
        llmConfig: 'LLM Config', apiSettings: 'API Settings', promptEditor: 'Prompt Editor',
        suggester: 'Suggester', critic: 'Critic', maxRounds: 'Max Rounds',
        saveConfig: 'Save Config', saved: 'Saved', savePrompts: 'Save Prompts',
        promptHint: 'Customize agent system prompts to control debate style and role behavior.',
        reset: 'Reset', resetAll: 'Reset All', consensusPrompt: 'Consensus Summary Prompt',
        directInput: 'Direct Text Input', directInputHint: 'Paste an abstract, code snippet, or any text...',
        applyText: '✅ Use This Text', startDebate: 'Start Debate', stopDebate: 'Stop Debate', export: 'Export',
        round: 'Round', consensusResult: 'Consensus', footerNote: 'Pure frontend, no backend needed. API keys stored locally only.',
        confirmClearHistory: 'Clear all history?', confirmDeleteItem: 'Delete this record?',
      }
    };
    if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    if (typeof marked !== 'undefined') marked.setOptions({
      highlight: (code, lang) => { if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value; return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code; },
      breaks: true, gfm: true,
    });

    function debateApp() {
      return {
        lang: 'zh',
        t(key) { return (I18N[this.lang] || I18N.zh)[key] || key; },
        toggleLang() { this.lang = this.lang === 'zh' ? 'en' : 'zh'; localStorage.setItem('debateai_lang', this.lang); },
        fileName: '', fileSize: 0, fileContent: '', directText: '', showTextInput: false,
        configA: { baseUrl: '', apiKey: '', model: '' }, configB: { baseUrl: '', apiKey: '', model: '' },
        maxRounds: 6, showConfig: true, configSaved: false, configTab: 'api',
        promptA: '', promptB: '', promptConsensus: '',
        defaultPromptA() { return this.lang === 'zh' ? `你是一个专业的分析专家（建议者）。你的职责是：\n1. 仔细分析用户提供的材料（论文/代码/文本）\n2. 提出具体、可操作的改进建议\n3. 如果涉及代码，提供改进后的代码\n4. 输出结构化的分析，包含：问题分析、改进建议、代码示例\n5. 用中文回答` : `You are a professional analyst (Suggester). Your responsibilities:\n1. Carefully analyze the user's material (paper/code/text)\n2. Propose specific, actionable improvements\n3. If code is involved, provide improved code\n4. Output structured analysis: problem analysis, improvement suggestions, code examples`; },
        defaultPromptB() { return this.lang === 'zh' ? `你是一个严格的审查者（批评者）。你的职责是：\n1. 仔细审查 Agent A 的建议，找出逻辑漏洞、技术错误、遗漏点\n2. 提出你的替代方案或补充建议\n3. 不要无理由反对——如果 A 的建议确实好，可以表示认可\n4. 如果发现问题，详细说明问题所在并给出你的方案\n5. 用中文回答` : `You are a rigorous reviewer (Critic). Your responsibilities:\n1. Carefully review Agent A's suggestions, finding logical flaws, technical errors, and omissions\n2. Propose alternatives or supplementary suggestions\n3. Don't disagree without reason — if A's suggestion is good, acknowledge it\n4. If you find issues, explain them in detail and provide your solution`; },
        defaultPromptConsensus() { return this.lang === 'zh' ? `你是总结者。根据以下辩论记录，提炼双方共识，输出最终结论和改进代码。用 Markdown 格式。` : `You are a summarizer. Based on the debate record below, extract the consensus between both parties, output final conclusions and improved code. Use Markdown format.`; },
        isDebating: false, messages: [], consensus: '', currentRound: 0, error: '', abortController: null,
        showHistory: false, historyList: [],
        get canStart() { return (this.fileContent || this.directText) && this.configA.baseUrl && this.configA.apiKey && this.configA.model && this.configB.baseUrl && this.configB.apiKey && this.configB.model; },
        get agentAMessages() { return this.messages.filter(m => m.agent === 'A'); },
        get agentBMessages() { return this.messages.filter(m => m.agent === 'B'); },
        init() { this.lang = localStorage.getItem('debateai_lang') || 'zh'; this.loadConfig(); this.loadHistoryList(); if (!this.promptA) this.promptA = this.defaultPromptA(); if (!this.promptB) this.promptB = this.defaultPromptB(); if (!this.promptConsensus) this.promptConsensus = this.defaultPromptConsensus(); },
        async handleFileDrop(e) { const f = e.dataTransfer.files[0]; if (f) await this.processFile(f); },
        async handleFileSelect(e) { const f = e.target.files[0]; if (f) await this.processFile(f); },
        async processFile(file) {
          const ext = file.name.split('.').pop().toLowerCase();
          if (!['pdf','py','txt','md','csv','json','js','ts','java','cpp','c','h','go','rs','rb','php','html','css','yaml','yml','toml','xml','sh','sql'].includes(ext)) { this.error = this.lang === 'zh' ? '不支持的文件格式' : 'Unsupported format'; return; }
          this.fileName = file.name; this.fileSize = file.size; this.error = ''; this.directText = '';
          this.fileContent = ext === 'pdf' ? await this.parsePDF(file) : await this.readText(file);
        },
        readText(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = () => rej(new Error('Read failed')); r.readAsText(file); }); },
        async parsePDF(file) { const buf = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({ data: buf }).promise; let t = ''; for (let i = 1; i <= pdf.numPages; i++) { const p = await pdf.getPage(i); const c = await p.getTextContent(); t += c.items.map(it => it.str).join(' ') + '\n\n'; } return t.trim(); },
        formatSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; return (b / 1048576).toFixed(1) + ' MB'; },
        applyDirectText() { if (this.directText.trim()) { this.fileContent = this.directText.trim(); this.fileName = this.lang === 'zh' ? '直接输入文本' : 'Direct text input'; this.fileSize = this.fileContent.length; } },
        saveConfig() {
          localStorage.setItem('debateai_config', JSON.stringify({ configA: this.configA, configB: this.configB, maxRounds: this.maxRounds, promptA: this.promptA, promptB: this.promptB, promptConsensus: this.promptConsensus }));
          this.configSaved = true; setTimeout(() => this.configSaved = false, 2000);
        },
        loadConfig() { try { const d = JSON.parse(localStorage.getItem('debateai_config')); if (d) { if (d.configA) this.configA = { ...this.configA, ...d.configA }; if (d.configB) this.configB = { ...this.configB, ...d.configB }; if (d.maxRounds) this.maxRounds = d.maxRounds; if (d.promptA) this.promptA = d.promptA; if (d.promptB) this.promptB = d.promptB; if (d.promptConsensus) this.promptConsensus = d.promptConsensus; } } catch (e) {} },
        resetAllPrompts() { this.promptA = this.defaultPromptA(); this.promptB = this.defaultPromptB(); this.promptConsensus = this.defaultPromptConsensus(); },
        renderMarkdown(t) { if (!t) return ''; try { return marked.parse(t); } catch (e) { return t.replace(/</g, '&lt;').replace(/>/g, '&gt;'); } },
        async startDebate() {
          if (!this.canStart) return; const content = this.fileContent; if (!content) return;
          this.isDebating = true; this.messages = []; this.consensus = ''; this.currentRound = 0; this.error = ''; this.abortController = new AbortController();
          try {
            this.currentRound = 1;
            const hA = [{ role: 'system', content: this.promptA }, { role: 'user', content: (this.lang === 'zh' ? '请分析以下材料并提出改进建议：\n\n' : 'Please analyze the following material and suggest improvements:\n\n') + content }];
            const mA1 = this.addMessage('A', '', 1); await this.callLLM(this.configA, hA, ch => this.appendToMessage(mA1, ch));
            const hB = [{ role: 'system', content: this.promptB }, { role: 'user', content: (this.lang === 'zh' ? '以下是一份材料和 Agent A 的分析建议。请审查并指出问题：\n\n材料：' : 'Here is a material and Agent A\'s analysis. Please review and point out issues:\n\nMaterial: ') + content + (this.lang === 'zh' ? '\n\nAgent A 的建议：' : '\n\nAgent A\'s suggestions: ') + mA1.content }];
            const mB1 = this.addMessage('B', '', 1); await this.callLLM(this.configB, hB, ch => this.appendToMessage(mB1, ch));
            if (this.detectConsensus(mB1.content)) { await this.extractConsensus(); return; }
            let pA = mA1, pB = mB1, hhA = [...hA], hhB = [...hB];
            for (let r = 2; r <= this.maxRounds; r++) {
              this.currentRound = r;
              hhA.push({ role: 'assistant', content: pA.content }, { role: 'user', content: (this.lang === 'zh' ? 'Agent B 对你的建议提出了以下批评，请回应：\n\n' : 'Agent B criticized your suggestions. Please respond:\n\n') + pB.content });
              const mA = this.addMessage('A', '', r); await this.callLLM(this.configA, hhA, ch => this.appendToMessage(mA, ch)); pA = mA;
              hhB.push({ role: 'assistant', content: pB.content }, { role: 'user', content: (this.lang === 'zh' ? 'Agent A 回应了你的批评：\n\n' : 'Agent A responded to your criticism:\n\n') + pA.content + (this.lang === 'zh' ? '\n\n请继续审查或表示同意。' : '\n\nPlease continue reviewing or express agreement.') });
              const mB = this.addMessage('B', '', r); await this.callLLM(this.configB, hhB, ch => this.appendToMessage(mB, ch)); pB = mB;
              if (this.detectConsensus(pB.content)) break;
            }
            await this.extractConsensus();
          } catch (e) { this.error = e.name === 'AbortError' ? (this.lang === 'zh' ? '辩论已中止' : 'Debate aborted') : `Error: ${e.message}`; }
          finally { this.isDebating = false; this.abortController = null; }
        },
        async extractConsensus() {
          const s = this.buildDebateSummary(); const c = this.addMessage('consensus', '', 0);
          await this.callLLM(this.configA, [{ role: 'system', content: this.promptConsensus }, { role: 'user', content: s }], ch => this.appendToMessage(c, ch));
          this.consensus = c.content; this.saveToHistory();
        },
        buildDebateSummary() { let s = (this.lang === 'zh' ? '辩论记录：\n\n' : 'Debate Record:\n\n'); for (const m of this.messages) { const r = m.agent === 'A' ? 'Agent A' : m.agent === 'B' ? 'Agent B' : 'Consensus'; s += `## ${this.lang === 'zh' ? '第' : 'Round '}${m.round}${this.lang === 'zh' ? '轮' : ''} - ${r}\n\n${m.content}\n\n---\n\n`; } return s; },
        addMessage(agent, content, round) { const m = { agent, content, round, id: Date.now() + Math.random() }; this.messages.push(m); this.$nextTick(() => this.scrollToBottom()); return m; },
        appendToMessage(msg, chunk) { msg.content += chunk; if (!this._sth) { this._sth = true; requestAnimationFrame(() => { this.scrollToBottom(); this._sth = false; }); } },
        scrollToBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); },
        async callLLM(config, messages, onChunk) {
          const signal = this.abortController ? this.abortController.signal : undefined;
          const resp = await fetch(config.baseUrl.replace(/\/+$/, '') + '/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKey}` }, body: JSON.stringify({ model: config.model, messages, stream: true }), signal });
          if (!resp.ok) { const t = await resp.text().catch(() => ''); throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`); }
          const reader = resp.body.getReader(), dec = new TextDecoder(); let buf = '';
          while (true) { const { done, value } = await reader.read(); if (done) break; buf += dec.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop() || ''; for (const l of lines) { const tr = l.trim(); if (!tr || !tr.startsWith('data:')) continue; const d = tr.slice(5).trim(); if (d === '[DONE]') return; try { const j = JSON.parse(d); const dt = j.choices && j.choices[0] && j.choices[0].delta; if (dt && dt.content) onChunk(dt.content); } catch (e) {} } }
        },
        detectConsensus(text) { return ['同意','认可','达成共识','没有异议','你说得对','有道理','agree','consensus','我同意','完全同意','基本同意','I agree','no objections','common ground'].some(k => text.toLowerCase().includes(k.toLowerCase())); },
        abortDebate() { if (this.abortController) this.abortController.abort(); },
        loadHistoryList() { try { this.historyList = JSON.parse(localStorage.getItem('debateai_history')) || []; } catch (e) { this.historyList = []; } },
        saveToHistory() {
          const r = { id: Date.now(), timestamp: new Date().toISOString(), fileName: this.fileName, fileSize: this.fileSize, agentA: { model: this.configA.model, baseUrl: this.configA.baseUrl }, agentB: { model: this.configB.model, baseUrl: this.configB.baseUrl }, rounds: this.currentRound, messages: JSON.parse(JSON.stringify(this.messages)), consensus: this.consensus, contentPreview: this.fileContent.slice(0, 500) };
          this.historyList.unshift(r); if (this.historyList.length > 50) this.historyList = this.historyList.slice(0, 50);
          localStorage.setItem('debateai_history', JSON.stringify(this.historyList));
        },
        loadHistory(h) { this.messages = h.messages || []; this.consensus = h.consensus || ''; this.currentRound = h.rounds || 0; this.fileName = h.fileName || ''; this.showHistory = false; this.$nextTick(() => this.scrollToBottom()); },
        deleteHistory(id) { if (!confirm(this.t('confirmDeleteItem'))) return; this.historyList = this.historyList.filter(h => h.id !== id); localStorage.setItem('debateai_history', JSON.stringify(this.historyList)); },
        clearAllHistory() { if (!confirm(this.t('confirmClearHistory'))) return; this.historyList = []; localStorage.removeItem('debateai_history'); },
        formatDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString(this.lang === 'zh' ? 'zh-CN' : 'en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); },
        exportCurrentDebate() { if (!this.messages.length) return; this.exportHistory({ fileName: this.fileName, timestamp: new Date().toISOString(), agentA: { model: this.configA.model }, agentB: { model: this.configB.model }, rounds: this.currentRound, messages: this.messages, consensus: this.consensus }, 'md'); },
        exportHistory(h, fmt) {
          let c, m, e;
          if (fmt === 'json') { c = JSON.stringify(h, null, 2); m = 'application/json'; e = 'json'; }
          else { c = this.buildExportMD(h); m = 'text/markdown'; e = 'md'; }
          const blob = new Blob([c], { type: m }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `debate-${h.fileName || 'text'}-${h.id || Date.now()}.${e}`; a.click(); URL.revokeObjectURL(url);
        },
        buildExportMD(h) {
          let md = `# DebateAI ${this.lang === 'zh' ? '辩论记录' : 'Debate Record'}\n\n`;
          md += `- **${this.lang === 'zh' ? '文件' : 'File'}**: ${h.fileName || 'N/A'}\n- **${this.lang === 'zh' ? '日期' : 'Date'}**: ${new Date(h.timestamp).toLocaleString()}\n- **Agent A**: ${h.agentA?.model || 'N/A'}\n- **Agent B**: ${h.agentB?.model || 'N/A'}\n- **${this.lang === 'zh' ? '轮次' : 'Rounds'}**: ${h.rounds}\n\n---\n\n`;
          for (const m of (h.messages || [])) { const r = m.agent === 'A' ? '🟦 Agent A' : m.agent === 'B' ? '🟥 Agent B' : '🤝 Consensus'; md += `## ${r} — ${this.lang === 'zh' ? '第' : 'Round '}${m.round}${this.lang === 'zh' ? '轮' : ''}\n\n${m.content}\n\n---\n\n`; }
          if (h.consensus) md += `## 🤝 ${this.lang === 'zh' ? '共识结论' : 'Consensus'}\n\n${h.consensus}\n`;
          return md;
        },
      };
    }
  </script>

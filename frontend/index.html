<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DebateAI — 双模型对抗辩论平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' },
            accent: { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5', glow: 'rgba(99,102,241,0.12)' },
            agentA: { DEFAULT: '#3b82f6', light: '#60a5fa', dark: '#2563eb', surface: '#eff6ff', border: '#bfdbfe', glow: 'rgba(59,130,246,0.08)' },
            agentB: { DEFAULT: '#f43f5e', light: '#fb7185', dark: '#e11d48', surface: '#fff1f2', border: '#fecdd3', glow: 'rgba(244,63,94,0.08)' },
            consensus: { DEFAULT: '#10b981', light: '#34d399', dark: '#059669', surface: '#ecfdf5', border: '#a7f3d0' },
          }
        }
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { background: #0f172a; color: #e2e8f0; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* ── Animations ── */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-24px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes typing-bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.15); } 50% { box-shadow: 0 0 40px rgba(99,102,241,0.3); } }
    @keyframes progress-stripe { 0% { background-position: 0 0; } 100% { background-position: 40px 0; } }

    .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .slide-in-left { animation: slideInLeft 0.4s ease-out forwards; }
    .slide-in-right { animation: slideInRight 0.4s ease-out forwards; }
    .scale-in { animation: scaleIn 0.3s ease-out forwards; }

    .typing-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #6366f1; margin: 0 3px; animation: typing-bounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    .typing-dot:nth-child(3) { animation-delay: 0s; }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 2px dashed #334155;
      background: linear-gradient(135deg, rgba(99,102,241,0.03), rgba(59,130,246,0.03));
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #6366f1;
      background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(59,130,246,0.06));
      box-shadow: 0 0 30px rgba(99,102,241,0.1);
      transform: translateY(-2px);
    }

    /* ── Cards ── */
    .glass-card {
      background: rgba(30,41,59,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(51,65,85,0.5);
      border-radius: 16px;
      transition: all 0.25s ease;
    }
    .glass-card:hover { border-color: rgba(99,102,241,0.3); }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,0.5); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0) scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      background: rgba(51,65,85,0.4);
      border: 1px solid rgba(51,65,85,0.6);
      color: #94a3b8;
      transition: all 0.2s ease;
    }
    .btn-ghost:hover { background: rgba(51,65,85,0.6); color: #e2e8f0; border-color: #64748b; }

    .btn-danger {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      color: #fb7185;
      transition: all 0.2s ease;
    }
    .btn-danger:hover { background: rgba(244,63,94,0.2); border-color: #f43f5e; }

    /* ── Inputs ── */
    .input-field {
      background: rgba(15,23,42,0.5);
      border: 1px solid #334155;
      color: #e2e8f0;
      transition: all 0.2s ease;
    }
    .input-field::placeholder { color: #475569; }
    .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); outline: none; }

    /* ── Tabs ── */
    .tab-active { color: #e2e8f0; border-bottom: 2px solid #6366f1; }
    .tab-inactive { color: #64748b; border-bottom: 2px solid transparent; }
    .tab-inactive:hover { color: #94a3b8; }

    /* ── Debate bubbles ── */
    .bubble-a {
      background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(59,130,246,0.04));
      border: 1px solid rgba(59,130,246,0.2);
      border-left: 3px solid #3b82f6;
    }
    .bubble-b {
      background: linear-gradient(135deg, rgba(244,63,94,0.08), rgba(244,63,94,0.04));
      border: 1px solid rgba(244,63,94,0.2);
      border-left: 3px solid #f43f5e;
    }
    .bubble-consensus {
      background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(16,185,129,0.04));
      border: 1px solid rgba(16,185,129,0.3);
    }

    /* ── Round badge ── */
    .round-badge {
      background: linear-gradient(135deg, #1e293b, #334155);
      border: 1px solid #475569;
      font-variant-numeric: tabular-nums;
    }

    /* ── Progress bar ── */
    .progress-bar {
      background: linear-gradient(90deg, #6366f1, #818cf8, #6366f1);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      border-radius: 999px;
      height: 3px;
    }

    /* ── Markdown content ── */
    .md-content { color: #cbd5e1; line-height: 1.75; }
    .md-content h1,.md-content h2,.md-content h3 { font-weight: 700; margin-top: 1em; margin-bottom: 0.5em; color: #f1f5f9; }
    .md-content h1 { font-size: 1.35em; } .md-content h2 { font-size: 1.15em; } .md-content h3 { font-size: 1.05em; }
    .md-content p { margin-bottom: 0.7em; }
    .md-content ul,.md-content ol { margin-left: 1.5em; margin-bottom: 0.7em; }
    .md-content li { margin-bottom: 0.3em; }
    .md-content code { background: rgba(99,102,241,0.15); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.88em; color: #a5b4fc; }
    .md-content pre { background: #0f172a; border: 1px solid #1e293b; border-radius: 10px; padding: 1em; overflow-x: auto; margin: 0.8em 0; }
    .md-content pre code { background: transparent; padding: 0; font-size: 0.83em; line-height: 1.6; color: #e2e8f0; }
    .md-content blockquote { border-left: 3px solid #6366f1; padding-left: 1em; color: #94a3b8; margin: 0.8em 0; }
    .md-content table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
    .md-content th,.md-content td { border: 1px solid #334155; padding: 0.5em 0.8em; text-align: left; }
    .md-content th { background: rgba(99,102,241,0.1); font-weight: 600; color: #a5b4fc; }
    .md-content strong { color: #f1f5f9; }
    .md-content a { color: #818cf8; text-decoration: underline; }

    /* ── History sidebar ── */
    .history-item { transition: background 0.15s ease; }
    .history-item:hover { background: rgba(99,102,241,0.06); }

    /* ── Pulse ring for active debate ── */
    .pulse-ring { position: relative; }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid #6366f1;
      animation: pulse-ring 2s cubic-bezier(0,0,0.2,1) infinite;
    }

    /* ── Prompt textarea ── */
    .prompt-textarea { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 0.8rem; line-height: 1.6; tab-size: 2; }

    /* ── Smooth collapse ── */
    [x-collapse] { overflow: hidden; }

    /* ── Header glass ── */
    .header-glass {
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(16px) saturate(1.8);
      border-bottom: 1px solid rgba(51,65,85,0.4);
    }
  </style>
</head>

<body class="min-h-screen" x-data="debateApp()" x-init="init()">

  <!-- ── Header ── -->
  <header class="sticky top-0 z-50 header-glass">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-agentA flex items-center justify-center text-white font-extrabold text-base shadow-lg shadow-accent/30">D</div>
          <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full bg-consensus border-2 border-surface-900"></div>
        </div>
        <div>
          <h1 class="text-lg font-bold text-white tracking-tight">DebateAI</h1>
          <p class="text-surface-400 text-xs" x-text="t('subtitle')"></p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button @click="toggleLang()" class="px-3 py-1.5 text-xs rounded-lg btn-ghost font-medium transition-all"
                x-text="lang === 'zh' ? 'EN' : '中文'"></button>
        <button @click="showHistory = !showHistory" class="relative px-3 py-1.5 text-xs rounded-lg btn-ghost font-medium transition-all">
          <span class="mr-1">📜</span> <span x-text="t('history')"></span>
          <span x-show="historyList.length > 0"
                class="absolute -top-2 -right-2 min-w-[18px] h-[18px] px-1 bg-accent rounded-full text-[10px] text-white flex items-center justify-center font-bold"
                x-text="historyList.length"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── History Sidebar ── -->
  <div x-show="showHistory" x-cloak
       x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm" @click.self="showHistory = false">
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-surface-900 border-l border-surface-700 overflow-y-auto shadow-2xl"
         x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full">
      <div class="p-5 border-b border-surface-700 flex items-center justify-between sticky top-0 bg-surface-900/95 backdrop-blur-sm z-10">
        <h2 class="text-lg font-bold text-white" x-text="t('debateHistory')"></h2>
        <button @click="showHistory = false" class="w-8 h-8 rounded-lg flex items-center justify-center text-surface-400 hover:text-white hover:bg-surface-700 transition-all text-xl">&times;</button>
      </div>
      <div x-show="historyList.length === 0" class="p-12 text-center text-surface-500">
        <div class="text-5xl mb-4 opacity-50">📭</div>
        <p class="text-sm" x-text="t('noHistory')"></p>
      </div>
      <div class="divide-y divide-surface-800">
        <template x-for="(h, idx) in historyList" :key="h.id">
          <div class="history-item p-4 cursor-pointer" @click="loadHistory(h)">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm font-medium text-surface-200 truncate max-w-[220px]" x-text="h.fileName || t('textInput')"></span>
              <span class="text-xs text-surface-500" x-text="formatDate(h.timestamp)"></span>
            </div>
            <div class="flex items-center gap-3 text-xs text-surface-400 mb-3">
              <span class="px-2 py-0.5 rounded-full bg-surface-800 text-surface-300" x-text="h.rounds + ' ' + t('rounds')"></span>
              <span class="truncate" x-text="h.agentA.model + ' vs ' + h.agentB.model"></span>
            </div>
            <div class="flex items-center gap-2">
              <button @click.stop="exportHistory(h, 'md')" class="px-2.5 py-1 text-xs rounded-md btn-ghost">📄 MD</button>
              <button @click.stop="exportHistory(h, 'json')" class="px-2.5 py-1 text-xs rounded-md btn-ghost">{ } JSON</button>
              <button @click.stop="deleteHistory(h.id)" class="px-2.5 py-1 text-xs rounded-md btn-danger ml-auto">🗑</button>
            </div>
          </div>
        </template>
      </div>
      <div x-show="historyList.length > 0" class="p-4 border-t border-surface-700 sticky bottom-0 bg-surface-900/95 backdrop-blur-sm">
        <button @click="clearAllHistory()" class="w-full px-3 py-2.5 text-sm rounded-xl btn-danger font-medium" x-text="t('clearAll')"></button>
      </div>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 space-y-5">

    <!-- ── Error Alert ── -->
    <div x-show="error" x-cloak x-transition
         class="bg-red-950/40 border border-red-800/50 rounded-xl px-4 py-3 flex items-center justify-between backdrop-blur-sm">
      <span class="text-red-300 text-sm flex items-center gap-2">
        <svg class="w-4 h-4 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        <span x-text="error"></span>
      </span>
      <button @click="error = ''" class="text-red-400 hover:text-red-200 transition-colors text-lg leading-none ml-3">&times;</button>
    </div>

    <!-- ══════════════════════════════════════════════
         SECTION 1: Upload Zone (Hero)
         ══════════════════════════════════════════════ -->
    <section class="upload-zone rounded-2xl p-8 sm:p-10 text-center cursor-pointer relative overflow-hidden"
      @click="$refs.fileInput.click()"
      @dragover.prevent="$el.classList.add('drag-over')"
      @dragleave.prevent="$el.classList.remove('drag-over')"
      @drop.prevent="$el.classList.remove('drag-over'); handleFileDrop($event)">

      <!-- Decorative grid -->
      <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(circle, #6366f1 1px, transparent 1px); background-size: 24px 24px;"></div>

      <input type="file" x-ref="fileInput" class="hidden"
             accept=".pdf,.py,.txt,.md,.csv,.json,.js,.ts,.java,.cpp,.c,.h,.go,.rs,.rb,.php,.html,.css,.yaml,.yml,.toml,.xml,.sh,.sql"
             @change="handleFileSelect($event)">

      <div x-show="!fileName" class="relative">
        <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-accent/20 to-agentA/20 flex items-center justify-center">
          <svg class="w-8 h-8 text-accent-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <p class="text-lg font-semibold text-surface-200" x-text="t('dragDrop')"></p>
        <p class="text-sm text-surface-500 mt-2" x-text="t('supportedFormats')"></p>
      </div>

      <div x-show="fileName" x-cloak class="relative">
        <div class="w-14 h-14 mx-auto mb-3 rounded-2xl bg-accent/15 flex items-center justify-center">
          <svg class="w-7 h-7 text-accent-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <p class="text-lg font-semibold text-accent-light" x-text="fileName"></p>
        <p class="text-sm text-surface-400 mt-1" x-text="formatSize(fileSize)"></p>
        <p class="text-xs text-surface-500 mt-2" x-text="t('clickReplace')"></p>
      </div>
    </section>

    <!-- ══════════════════════════════════════════════
         SECTION 2: Config Panel (Collapsible)
         ══════════════════════════════════════════════ -->
    <section class="glass-card overflow-hidden">
      <button @click="showConfig = !showConfig"
              class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-700/30 transition-colors">
        <span class="font-semibold text-surface-200 text-sm flex items-center gap-2.5">
          <svg class="w-4 h-4 text-surface-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span x-text="t('llmConfig')"></span>
        </span>
        <svg class="w-4 h-4 text-surface-500 transition-transform duration-200" :class="showConfig && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <div x-show="showConfig" x-collapse class="px-5 pb-5 space-y-5">
        <!-- Tabs -->
        <div class="flex gap-5 border-b border-surface-700 -mx-5 px-5 mb-1">
          <button @click="configTab = 'api'" class="pb-2.5 text-sm font-medium transition-colors"
                  :class="configTab === 'api' ? 'tab-active' : 'tab-inactive'" x-text="t('apiSettings')"></button>
          <button @click="configTab = 'prompts'" class="pb-2.5 text-sm font-medium transition-colors"
                  :class="configTab === 'prompts' ? 'tab-active' : 'tab-inactive'" x-text="t('promptEditor')"></button>
        </div>

        <!-- API Settings Tab -->
        <div x-show="configTab === 'api'" class="space-y-5">
          <!-- Agent A -->
          <div class="space-y-2.5">
            <h3 class="text-xs font-bold text-agentA-light flex items-center gap-2 uppercase tracking-wider">
              <span class="w-2.5 h-2.5 rounded-full bg-agentA shadow-sm shadow-agentA/50"></span>
              Agent A — <span x-text="t('suggester')"></span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2.5">
              <input type="text" x-model="configA.baseUrl" placeholder="https://api.openai.com/v1" class="input-field w-full rounded-xl px-3.5 py-2.5 text-sm">
              <input type="password" x-model="configA.apiKey" placeholder="sk-..." class="input-field w-full rounded-xl px-3.5 py-2.5 text-sm">
              <input type="text" x-model="configA.model" placeholder="gpt-4o" class="input-field w-full rounded-xl px-3.5 py-2.5 text-sm">
            </div>
          </div>
          <!-- Agent B -->
          <div class="space-y-2.5">
            <h3 class="text-xs font-bold text-agentB-light flex items-center gap-2 uppercase tracking-wider">
              <span class="w-2.5 h-2.5 rounded-full bg-agentB shadow-sm shadow-agentB/50"></span>
              Agent B — <span x-text="t('critic')"></span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2.5">

          <!-- Save row -->
          <div class="flex items-end gap-3 flex-wrap">
            <div>
              <label class="text-xs text-surface-400 mb-1.5 block font-medium" x-text="t('maxRounds')"></label>

              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>

            </button>
            <div x-show="configSaved" x-transition class="flex items-center gap-1.5 text-consensus text-sm font-medium">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <span x-text="t('saved')"></span>
            </div>
          </div>
        </div>

        <!-- Prompts Tab -->
        <div x-show="configTab === 'prompts'" class="space-y-4">
          <p class="text-xs text-surface-500 bg-surface-800/50 rounded-lg px-3 py-2" x-text="t('promptHint')"></p>

          <div class="space-y-2">
            <div class="flex items-center justify-between">
              <label class="text-xs font-bold text-agentA-light flex items-center gap-1.5 uppercase tracking-wider">

              </label>
              <button @click="promptA = defaultPromptA()" class="text-xs text-surface-500 hover:text-surface-300 transition-colors" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptA" rows="5" class="prompt-textarea input-field w-full rounded-xl px-3.5 py-2.5 text-sm resize-y"></textarea>
          </div>

          <div class="space-y-2">
            <div class="flex items-center justify-between">
              <label class="text-xs font-bold text-agentB-light flex items-center gap-1.5 uppercase tracking-wider">
                <span class="w-2 h-2 rounded-full bg-agentB"></span> Agent B — <span x-text="t('critic')"></span>
              </label>
              <button @click="promptB = defaultPromptB()" class="text-xs text-surface-500 hover:text-surface-300 transition-colors" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptB" rows="5" class="prompt-textarea input-field w-full rounded-xl px-3.5 py-2.5 text-sm resize-y"></textarea>
          </div>

          <div class="space-y-2">
            <div class="flex items-center justify-between">
              <label class="text-xs font-bold text-consensus-light flex items-center gap-1.5 uppercase tracking-wider">
                <span class="w-2 h-2 rounded-full bg-consensus"></span> <span x-text="t('consensusPrompt')"></span>
              </label>
              <button @click="promptConsensus = defaultPromptConsensus()" class="text-xs text-surface-500 hover:text-surface-300 transition-colors" x-text="t('reset')"></button>
            </div>
            <textarea x-model="promptConsensus" rows="3" class="prompt-textarea input-field w-full rounded-xl px-3.5 py-2.5 text-sm resize-y"></textarea>
          </div>

          <div class="flex items-center gap-3">
            <button @click="saveConfig()" class="px-5 py-2.5 btn-primary rounded-xl text-sm font-semibold text-white flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <span x-text="t('savePrompts')"></span>
            </button>
            <button @click="resetAllPrompts()" class="px-4 py-2.5 btn-ghost rounded-xl text-sm font-medium" x-text="t('resetAll')"></button>
            <div x-show="configSaved" x-transition class="flex items-center gap-1.5 text-consensus text-sm font-medium">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <span x-text="t('saved')"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ══════════════════════════════════════════════
         SECTION 3: Direct Text Input (Collapsible)
         ══════════════════════════════════════════════ -->
    <section class="glass-card overflow-hidden">
      <button @click="showTextInput = !showTextInput"
              class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-700/30 transition-colors">
        <span class="font-semibold text-surface-200 text-sm flex items-center gap-2.5">
          <svg class="w-4 h-4 text-surface-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          <span x-text="t('directInput')"></span>
        </span>
        <svg class="w-4 h-4 text-surface-500 transition-transform duration-200" :class="showTextInput && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div x-show="showTextInput" x-collapse class="px-5 pb-5">
        <textarea x-model="directText" rows="5" :placeholder="t('directInputHint')"
                  class="input-field w-full rounded-xl px-3.5 py-2.5 text-sm resize-y"></textarea>
        <button @click="applyDirectText()" class="mt-3 px-4 py-2 btn-ghost rounded-xl text-sm font-medium transition-all flex items-center gap-2">
          <svg class="w-4 h-4 text-consensus" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          <span x-text="t('applyText')"></span>
        </button>
      </div>
    </section>

    <!-- ══════════════════════════════════════════════
         SECTION 4: Action Buttons
         ══════════════════════════════════════════════ -->
    <div class="flex justify-center gap-3 py-2">
      <button x-show="!isDebating" @click="startDebate()" :disabled="!canStart"
        class="px-8 py-3 btn-primary rounded-2xl text-base font-bold text-white flex items-center gap-2.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span x-text="t('startDebate')"></span>
      </button>

      <button x-show="isDebating" @click="abortDebate()"
        class="px-8 py-3 bg-surface-700 hover:bg-surface-600 rounded-2xl text-base font-bold text-surface-200 transition-all border border-surface-600 flex items-center gap-2.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
        <span x-text="t('stopDebate')"></span>
      </button>

      <button x-show="!isDebating && messages.length > 0 && consensus" @click="exportCurrentDebate()"
        class="px-6 py-3 btn-ghost rounded-2xl text-base font-bold flex items-center gap-2.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        <span x-text="t('export')"></span>
      </button>
    </div>

    <!-- ══════════════════════════════════════════════
         SECTION 5: Debate Arena
         ══════════════════════════════════════════════ -->
    <section x-show="messages.length > 0" x-cloak class="space-y-4">

      <!-- Round indicator -->
      <div x-show="currentRound > 0" class="flex items-center justify-center gap-3">
        <div class="round-badge px-4 py-1.5 rounded-full text-xs font-bold text-surface-300 flex items-center gap-2">
          <svg class="w-3.5 h-3.5 text-accent-light" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          <span x-text="t('round')"></span>
          <span x-text="currentRound" class="text-white text-sm"></span>
        </div>
        <div x-show="isDebating" class="flex items-center gap-1">
          <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>
      </div>

      <!-- Progress bar (during debate) -->
      <div x-show="isDebating" class="w-full max-w-md mx-auto">
        <div class="progress-bar" :style="'width:' + Math.min((currentRound / maxRounds) * 100, 100) + '%'"></div>
      </div>

      <!-- Two-column debate -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <!-- Agent A column -->
        <div class="space-y-3">
          <div class="flex items-center gap-2.5 px-2 py-1.5">
            <div class="w-8 h-8 rounded-lg bg-agentA/20 flex items-center justify-center">
              <span class="text-sm font-bold text-agentA-light">A</span>
            </div>
            <div>
              <h3 class="text-sm font-bold text-agentA-light">Agent A</h3>
              <p class="text-[10px] text-surface-500 uppercase tracking-wider" x-text="t('suggester')"></p>
            </div>
          </div>
          <template x-for="(msg, idx) in agentAMessages" :key="'a-'+idx">
            <div class="bubble-a rounded-xl p-4 md-content text-sm slide-in-left"
                 x-html="renderMarkdown(msg.content)"></div>
          </template>
        </div>

        <!-- Agent B column -->
        <div class="space-y-3">
          <div class="flex items-center gap-2.5 px-2 py-1.5">
            <div class="w-8 h-8 rounded-lg bg-agentB/20 flex items-center justify-center">
              <span class="text-sm font-bold text-agentB-light">B</span>
            </div>
            <div>
              <h3 class="text-sm font-bold text-agentB-light">Agent B</h3>
              <p class="text-[10px] text-surface-500 uppercase tracking-wider" x-text="t('critic')"></p>
            </div>
          </div>
          <template x-for="(msg, idx) in agentBMessages" :key="'b-'+idx">
            <div class="bubble-b rounded-xl p-4 md-content text-sm slide-in-right"
                 x-html="renderMarkdown(msg.content)"></div>
          </template>
        </div>
      </div>
    </section>

    <!-- ══════════════════════════════════════════════
         SECTION 6: Consensus Result
         ══════════════════════════════════════════════ -->
    <section x-show="consensus" x-cloak class="fade-in-up">
      <div class="bubble-consensus rounded-2xl p-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-consensus/5 rounded-full -translate-y-16 translate-x-16"></div>
        <h2 class="text-lg font-bold text-consensus-light mb-4 flex items-center gap-2.5 relative">
          <div class="w-9 h-9 rounded-xl bg-consensus/20 flex items-center justify-center">
            <svg class="w-5 h-5 text-consensus-light" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <span x-text="t('consensusResult')"></span>
        </h2>
        <div class="md-content text-sm relative" x-html="renderMarkdown(consensus)"></div>
      </div>
    </section>

    <!-- ── Footer ── -->
    <footer class="text-center text-xs text-surface-600 py-6 border-t border-surface-800 mt-8">
      <span class="text-surface-500 font-medium">DebateAI</span> — <span x-text="t('footerNote')"></span>
    </footer>
  </main>

  <script>
    const I18N = {
      zh: {
        subtitle: '两个 AI 互相挑刺，找到最优解',
        history: '历史', debateHistory: '📜 辩论历史', noHistory: '暂无历史记录',
        clearAll: '🗑 清空所有历史', textInput: '文本输入', rounds: '轮',
        dragDrop: '拖拽或点击上传文件', supportedFormats: '支持 PDF / 代码 / 文本 / Markdown 等',
        clickReplace: '点击或拖拽替换文件',
        llmConfig: 'LLM 配置', apiSettings: 'API 设置', promptEditor: 'Prompt 编辑器',
        suggester: '建议者', critic: '批评者', maxRounds: '最大轮次',
        saveConfig: '保存配置', saved: '已保存', savePrompts: '保存 Prompt',
        promptHint: '自定义 Agent 的系统提示词，控制辩论风格和角色行为。',
        reset: '重置', resetAll: '全部重置', consensusPrompt: '共识总结 Prompt',
        directInput: '直接输入文本', directInputHint: '粘贴论文摘要、代码片段或任何文本...',
        applyText: '使用此文本', startDebate: '开始辩论', stopDebate: '停止辩论', export: '导出',
        round: '第', consensusResult: '共识结论', footerNote: '纯前端，无需后端。API Key 仅存储在浏览器本地。',
        confirmClearHistory: '确定清空所有历史记录？', confirmDeleteItem: '确定删除此记录？',
      },
      en: {
        subtitle: 'Two AIs debate to find the best solution',
        history: 'History', debateHistory: '📜 Debate History', noHistory: 'No history yet',
        clearAll: '🗑 Clear All', textInput: 'Text Input', rounds: 'rounds',
        dragDrop: 'Drag & drop or click to upload', supportedFormats: 'Supports PDF / Code / Text / Markdown etc.',
        clickReplace: 'Click or drag to replace',
        llmConfig: 'LLM Config', apiSettings: 'API Settings', promptEditor: 'Prompt Editor',
        suggester: 'Suggester', critic: 'Critic', maxRounds: 'Max Rounds',
        saveConfig: 'Save Config', saved: 'Saved', savePrompts: 'Save Prompts',
        promptHint: 'Customize agent system prompts to control debate style and role behavior.',
        reset: 'Reset', resetAll: 'Reset All', consensusPrompt: 'Consensus Summary Prompt',
        directInput: 'Direct Text Input', directInputHint: 'Paste an abstract, code snippet, or any text...',
        applyText: 'Use This Text', startDebate: 'Start Debate', stopDebate: 'Stop Debate', export: 'Export',
        round: 'Round', consensusResult: 'Consensus', footerNote: 'Pure frontend, no backend needed. API keys stored locally only.',
        confirmClearHistory: 'Clear all history?', confirmDeleteItem: 'Delete this record?',
      }
    };
    if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    if (typeof marked !== 'undefined') marked.setOptions({
      highlight: (code, lang) => { if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value; return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code; },
      breaks: true, gfm: true,
    });

    function debateApp() {
      return {
        lang: 'zh',
        t(key) { return (I18N[this.lang] || I18N.zh)[key] || key; },
        toggleLang() { this.lang = this.lang === 'zh' ? 'en' : 'zh'; localStorage.setItem('debateai_lang', this.lang); },
        fileName: '', fileSize: 0, fileContent: '', directText: '', showTextInput: false,
        configA: { baseUrl: '', apiKey: '', model: '' }, configB: { baseUrl: '', apiKey: '', model: '' },
        maxRounds: 6, showConfig: true, configSaved: false, configTab: 'api',
        promptA: '', promptB: '', promptConsensus: '',
        defaultPromptA() { return this.lang === 'zh' ? `你是一个专业的分析专家（建议者）。你的职责是：\n1. 仔细分析用户提供的材料（论文/代码/文本）\n2. 提出具体、可操作的改进建议\n3. 如果涉及代码，提供改进后的代码\n4. 输出结构化的分析，包含：问题分析、改进建议、代码示例\n5. 用中文回答` : `You are a professional analyst (Suggester). Your responsibilities:\n1. Carefully analyze the user's material (paper/code/text)\n2. Propose specific, actionable improvements\n3. If code is involved, provide improved code\n4. Output structured analysis: problem analysis, improvement suggestions, code examples`; },
        defaultPromptB() { return this.lang === 'zh' ? `你是一个严格的审查者（批评者）。你的职责是：\n1. 仔细审查 Agent A 的建议，找出逻辑漏洞、技术错误、遗漏点\n2. 提出你的替代方案或补充建议\n3. 不要无理由反对——如果 A 的建议确实好，可以表示认可\n4. 如果发现问题，详细说明问题所在并给出你的方案\n5. 用中文回答` : `You are a rigorous reviewer (Critic). Your responsibilities:\n1. Carefully review Agent A's suggestions, finding logical flaws, technical errors, and omissions\n2. Propose alternatives or supplementary suggestions\n3. Don't disagree without reason — if A's suggestion is good, acknowledge it\n4. If you find issues, explain them in detail and provide your solution`; },
        defaultPromptConsensus() { return this.lang === 'zh' ? `你是总结者。根据以下辩论记录，提炼双方共识，输出最终结论和改进代码。用 Markdown 格式。` : `You are a summarizer. Based on the debate record below, extract the consensus between both parties, output final conclusions and improved code. Use Markdown format.`; },
        isDebating: false, messages: [], consensus: '', currentRound: 0, error: '', abortController: null,
        showHistory: false, historyList: [],
        get canStart() { return (this.fileContent || this.directText) && this.configA.baseUrl && this.configA.apiKey && this.configA.model && this.configB.baseUrl && this.configB.apiKey && this.configB.model; },
        get agentAMessages() { return this.messages.filter(m => m.agent === 'A'); },
        get agentBMessages() { return this.messages.filter(m => m.agent === 'B'); },
        init() { this.lang = localStorage.getItem('debateai_lang') || 'zh'; this.loadConfig(); this.loadHistoryList(); if (!this.promptA) this.promptA = this.defaultPromptA(); if (!this.promptB) this.promptB = this.defaultPromptB(); if (!this.promptConsensus) this.promptConsensus = this.defaultPromptConsensus(); },
        async handleFileDrop(e) { const f = e.dataTransfer.files[0]; if (f) await this.processFile(f); },
        async handleFileSelect(e) { const f = e.target.files[0]; if (f) await this.processFile(f); },
        async processFile(file) {
          const ext = file.name.split('.').pop().toLowerCase();
          if (!['pdf','py','txt','md','csv','json','js','ts','java','cpp','c','h','go','rs','rb','php','html','css','yaml','yml','toml','xml','sh','sql'].includes(ext)) { this.error = this.lang === 'zh' ? '不支持的文件格式' : 'Unsupported format'; return; }
          this.fileName = file.name; this.fileSize = file.size; this.error = ''; this.directText = '';
          this.fileContent = ext === 'pdf' ? await this.parsePDF(file) : await this.readText(file);
        },
        readText(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = () => rej(new Error('Read failed')); r.readAsText(file); }); },
        async parsePDF(file) { const buf = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({ data: buf }).promise; let t = ''; for (let i = 1; i <= pdf.numPages; i++) { const p = await pdf.getPage(i); const c = await p.getTextContent(); t += c.items.map(it => it.str).join(' ') + '\n\n'; } return t.trim(); },
        formatSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; return (b / 1048576).toFixed(1) + ' MB'; },
        applyDirectText() { if (this.directText.trim()) { this.fileContent = this.directText.trim(); this.fileName = this.lang === 'zh' ? '直接输入文本' : 'Direct text input'; this.fileSize = this.fileContent.length; } },
        saveConfig() {
          localStorage.setItem('debateai_config', JSON.stringify({ configA: this.configA, configB: this.configB, maxRounds: this.maxRounds, promptA: this.promptA, promptB: this.promptB, promptConsensus: this.promptConsensus }));
          this.configSaved = true; setTimeout(() => this.configSaved = false, 2000);
        },
        loadConfig() { try { const d = JSON.parse(localStorage.getItem('debateai_config')); if (d) { if (d.configA) this.configA = { ...this.configA, ...d.configA }; if (d.configB) this.configB = { ...this.configB, ...d.configB }; if (d.maxRounds) this.maxRounds = d.maxRounds; if (d.promptA) this.promptA = d.promptA; if (d.promptB) this.promptB = d.promptB; if (d.promptConsensus) this.promptConsensus = d.promptConsensus; } } catch (e) {} },
        resetAllPrompts() { this.promptA = this.defaultPromptA(); this.promptB = this.defaultPromptB(); this.promptConsensus = this.defaultPromptConsensus(); },
        renderMarkdown(t) { if (!t) return ''; try { return marked.parse(t); } catch (e) { return t.replace(/</g, '&lt;').replace(/>/g, '&gt;'); } },
        async startDebate() {
          if (!this.canStart) return; const content = this.fileContent; if (!content) return;
          this.isDebating = true; this.messages = []; this.consensus = ''; this.currentRound = 0; this.error = ''; this.abortController = new AbortController();
          try {
            this.currentRound = 1;
            const hA = [{ role: 'system', content: this.promptA }, { role: 'user', content: (this.lang === 'zh' ? '请分析以下材料并提出改进建议：\n\n' : 'Please analyze the following material and suggest improvements:\n\n') + content }];
            const mA1 = this.addMessage('A', '', 1); await this.callLLM(this.configA, hA, ch => this.appendToMessage(mA1, ch));
            const hB = [{ role: 'system', content: this.promptB }, { role: 'user', content: (this.lang === 'zh' ? '以下是一份材料和 Agent A 的分析建议。请审查并指出问题：\n\n材料：' : 'Here is a material and Agent A\'s analysis. Please review and point out issues:\n\nMaterial: ') + content + (this.lang === 'zh' ? '\n\nAgent A 的建议：' : '\n\nAgent A\'s suggestions: ') + mA1.content }];
            const mB1 = this.addMessage('B', '', 1); await this.callLLM(this.configB, hB, ch => this.appendToMessage(mB1, ch));
            if (this.detectConsensus(mB1.content)) { await this.extractConsensus(); return; }
            let pA = mA1, pB = mB1, hhA = [...hA], hhB = [...hB];
            for (let r = 2; r <= this.maxRounds; r++) {
              this.currentRound = r;
              hhA.push({ role: 'assistant', content: pA.content }, { role: 'user', content: (this.lang === 'zh' ? 'Agent B 对你的建议提出了以下批评，请回应：\n\n' : 'Agent B criticized your suggestions. Please respond:\n\n') + pB.content });
              const mA = this.addMessage('A', '', r); await this.callLLM(this.configA, hhA, ch => this.appendToMessage(mA, ch)); pA = mA;
              hhB.push({ role: 'assistant', content: pB.content }, { role: 'user', content: (this.lang === 'zh' ? 'Agent A 回应了你的批评：\n\n' : 'Agent A responded to your criticism:\n\n') + pA.content + (this.lang === 'zh' ? '\n\n请继续审查或表示同意。' : '\n\nPlease continue reviewing or express agreement.') });
              const mB = this.addMessage('B', '', r); await this.callLLM(this.configB, hhB, ch => this.appendToMessage(mB, ch)); pB = mB;
              if (this.detectConsensus(pB.content)) break;
            }
            await this.extractConsensus();
          } catch (e) { this.error = e.name === 'AbortError' ? (this.lang === 'zh' ? '辩论已中止' : 'Debate aborted') : `Error: ${e.message}`; }
          finally { this.isDebating = false; this.abortController = null; }
        },
        async extractConsensus() {
          const s = this.buildDebateSummary(); const c = this.addMessage('consensus', '', 0);
          await this.callLLM(this.configA, [{ role: 'system', content: this.promptConsensus }, { role: 'user', content: s }], ch => this.appendToMessage(c, ch));
          this.consensus = c.content; this.saveToHistory();
        },
        buildDebateSummary() { let s = (this.lang === 'zh' ? '辩论记录：\n\n' : 'Debate Record:\n\n'); for (const m of this.messages) { const r = m.agent === 'A' ? 'Agent A' : m.agent === 'B' ? 'Agent B' : 'Consensus'; s += `## ${this.lang === 'zh' ? '第' : 'Round '}${m.round}${this.lang === 'zh' ? '轮' : ''} - ${r}\n\n${m.content}\n\n---\n\n`; } return s; },
        addMessage(agent, content, round) { const m = { agent, content, round, id: Date.now() + Math.random() }; this.messages.push(m); this.$nextTick(() => this.scrollToBottom()); return m; },
        appendToMessage(msg, chunk) { msg.content += chunk; if (!this._sth) { this._sth = true; requestAnimationFrame(() => { this.scrollToBottom(); this._sth = false; }); } },
        scrollToBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); },
        async callLLM(config, messages, onChunk) {
          const signal = this.abortController ? this.abortController.signal : undefined;
          const resp = await fetch(config.baseUrl.replace(/\/+$/, '') + '/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKey}` }, body: JSON.stringify({ model: config.model, messages, stream: true }), signal });
          if (!resp.ok) { const t = await resp.text().catch(() => ''); throw new Error(`API ${resp.status}: ${t.slice(0, 200)}`); }
          const reader = resp.body.getReader(), dec = new TextDecoder(); let buf = '';
          while (true) { const { done, value } = await reader.read(); if (done) break; buf += dec.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop() || ''; for (const l of lines) { const tr = l.trim(); if (!tr || !tr.startsWith('data:')) continue; const d = tr.slice(5).trim(); if (d === '[DONE]') return; try { const j = JSON.parse(d); const dt = j.choices && j.choices[0] && j.choices[0].delta; if (dt && dt.content) onChunk(dt.content); } catch (e) {} } }
        },
        detectConsensus(text) { return ['同意','认可','达成共识','没有异议','你说得对','有道理','agree','consensus','我同意','完全同意','基本同意','I agree','no objections','common ground'].some(k => text.toLowerCase().includes(k.toLowerCase())); },
        abortDebate() { if (this.abortController) this.abortController.abort(); },
        loadHistoryList() { try { this.historyList = JSON.parse(localStorage.getItem('debateai_history')) || []; } catch (e) { this.historyList = []; } },
        saveToHistory() {
          const r = { id: Date.now(), timestamp: new Date().toISOString(), fileName: this.fileName, fileSize: this.fileSize, agentA: { model: this.configA.model, baseUrl: this.configA.baseUrl }, agentB: { model: this.configB.model, baseUrl: this.configB.baseUrl }, rounds: this.currentRound, messages: JSON.parse(JSON.stringify(this.messages)), consensus: this.consensus, contentPreview: this.fileContent.slice(0, 500) };
          this.historyList.unshift(r); if (this.historyList.length > 50) this.historyList = this.historyList.slice(0, 50);
          localStorage.setItem('debateai_history', JSON.stringify(this.historyList));
        },
        loadHistory(h) { this.messages = h.messages || []; this.consensus = h.consensus || ''; this.currentRound = h.rounds || 0; this.fileName = h.fileName || ''; this.showHistory = false; this.$nextTick(() => this.scrollToBottom()); },
        deleteHistory(id) { if (!confirm(this.t('confirmDeleteItem'))) return; this.historyList = this.historyList.filter(h => h.id !== id); localStorage.setItem('debateai_history', JSON.stringify(this.historyList)); },
        clearAllHistory() { if (!confirm(this.t('confirmClearHistory'))) return; this.historyList = []; localStorage.removeItem('debateai_history'); },
        formatDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString(this.lang === 'zh' ? 'zh-CN' : 'en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); },
        exportCurrentDebate() { if (!this.messages.length) return; this.exportHistory({ fileName: this.fileName, timestamp: new Date().toISOString(), agentA: { model: this.configA.model }, agentB: { model: this.configB.model }, rounds: this.currentRound, messages: this.messages, consensus: this.consensus }, 'md'); },
        exportHistory(h, fmt) {
          let c, m, e;
          if (fmt === 'json') { c = JSON.stringify(h, null, 2); m = 'application/json'; e = 'json'; }
          else { c = this.buildExportMD(h); m = 'text/markdown'; e = 'md'; }
          const blob = new Blob([c], { type: m }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `debate-${h.fileName || 'text'}-${h.id || Date.now()}.${e}`; a.click(); URL.revokeObjectURL(url);
        },
        buildExportMD(h) {
          let md = `# DebateAI ${this.lang === 'zh' ? '辩论记录' : 'Debate Record'}\n\n`;
          md += `- **${this.lang === 'zh' ? '文件' : 'File'}**: ${h.fileName || 'N/A'}\n- **${this.lang === 'zh' ? '日期' : 'Date'}**: ${new Date(h.timestamp).toLocaleString()}\n- **Agent A**: ${h.agentA?.model || 'N/A'}\n- **Agent B**: ${h.agentB?.model || 'N/A'}\n- **${this.lang === 'zh' ? '轮次' : 'Rounds'}**: ${h.rounds}\n\n---\n\n`;
          for (const m of (h.messages || [])) { const r = m.agent === 'A' ? '🟦 Agent A' : m.agent === 'B' ? '🟥 Agent B' : '🤝 Consensus'; md += `## ${r} — ${this.lang === 'zh' ? '第' : 'Round '}${m.round}${this.lang === 'zh' ? '轮' : ''}\n\n${m.content}\n\n---\n\n`; }
          if (h.consensus) md += `## 🤝 ${this.lang === 'zh' ? '共识结论' : 'Consensus'}\n\n${h.consensus}\n`;
          return md;
        },
      };
    }
  </script>

<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DebateAI — 多角色 AI 工程团队对抗平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#1A1A1A', 'surface-2': '#222222', 'surface-3': '#2A2A2A', 'surface-4': '#141414',
            'border-dim': '#333333',
            'green-accent': '#A3E635', 'yellow-accent': '#FBBF24',
            'blue-accent': '#60A5FA', 'rose-accent': '#FB7185', 'violet-accent': '#A78BFA',
            'cyan-accent': '#22D3EE', 'orange-accent': '#FB923C', 'emerald-accent': '#34D399',
            'pink-accent': '#F472B6', 'lime-accent': '#84CC16',
            'txt': { 1: '#E5E7EB', 2: '#D1D5DB', 3: '#9CA3AF', 4: '#6B7280' },
          }
        }
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    * { font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
    body { background: #1A1A1A; color: #E5E7EB; margin: 0; overflow: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #666; }
    @keyframes msgIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
    @keyframes typingBounce { 0%,80%,100% { transform:translateY(0) } 40% { transform:translateY(-4px) } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
    @keyframes spin { to { transform: rotate(360deg) } }
    .msg-in { animation: msgIn .3s ease-out; }
    .fade-up { animation: fadeUp .35s ease-out; }
    .typing-dot { display:inline-block; width:4px; height:4px; border-radius:50%; background:#6B7280; margin:0 2px; animation:typingBounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay:-.32s }
    .typing-dot:nth-child(2) { animation-delay:-.16s }
    .glow-green:focus-within { box-shadow: 0 0 0 2px #A3E635, 0 0 16px rgba(163,230,53,0.08); }
    .glow-yellow:focus-within { box-shadow: 0 0 0 2px #FBBF24, 0 0 16px rgba(251,191,36,0.08); }
    textarea { resize: none; }
    textarea::-webkit-scrollbar { width: 3px; }
    .md-content { color:#D1D5DB; font-size:.85rem; line-height:1.7; }
    .md-content h1,.md-content h2,.md-content h3 { font-weight:700; margin-top:.6em; margin-bottom:.3em; color:#F3F4F6; }
    .md-content h1 { font-size:1.15em } .md-content h2 { font-size:1.05em } .md-content h3 { font-size:1em }
    .md-content p { margin-bottom:.5em; }
    .md-content ul,.md-content ol { margin-left:1.2em; margin-bottom:.5em }
    .md-content li { margin-bottom:.15em }
    .md-content code { background:#333; padding:.1em .3em; border-radius:4px; font-size:.82em; color:#c084fc; font-family:'JetBrains Mono',monospace; }
    .md-content pre { background:#111; border:1px solid #333; border-radius:8px; padding:.7em; overflow-x:auto; margin:.5em 0 }
    .md-content pre code { background:transparent; padding:0; font-size:.78em; line-height:1.6; color:#E5E7EB }
    .md-content blockquote { border-left:3px solid #A3E635; padding-left:.7em; color:#9CA3AF; margin:.5em 0 }
    .md-content table { border-collapse:collapse; width:100%; margin:.5em 0 }
    .md-content th,.md-content td { border:1px solid #333; padding:.3em .5em; text-align:left }
    .md-content th { background:#222; font-weight:600 }
    .md-content strong { color:#F3F4F6; }
    .md-content a { color:#60a5fa; text-decoration:underline }
    .prompt-textarea { font-family:'JetBrains Mono',monospace; font-size:.75rem; line-height:1.5; }
    .role-card { transition: all .2s; cursor:pointer; }
    .role-card:hover { transform: translateY(-2px); }
    .role-card.active { ring: 2px; }
    .token-bar { height: 3px; border-radius: 999px; background: linear-gradient(90deg, #A3E635, #60A5FA, #A78BFA); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
  </style>
</head>
<body x-data="app()" x-init="init()">

  <!-- ═══ Header ═══ -->
  <header class="flex items-center justify-between h-11 px-4 bg-surface-4 border-b border-border-dim select-none flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1.5">
        <div class="w-2 h-2 rounded-full bg-green-accent opacity-80"></div>
        <span class="text-[11px] font-semibold text-txt-3 tracking-wider uppercase">Chat</span>
      </div>
      <div class="w-px h-3.5 bg-border-dim"></div>
      <span class="text-[11px] font-bold text-white tracking-widest uppercase">DebateAI</span>
      <span class="text-[10px] text-txt-4 ml-1 hidden sm:inline" x-text="t('subtitle')"></span>
    </div>
    <div class="flex items-center gap-2">
      <!-- Token counter -->
      <div x-show="totalTokens > 0" class="flex items-center gap-1.5 mr-2">
        <svg class="w-3 h-3 text-txt-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        <span class="text-[10px] text-txt-3 font-mono" x-text="formatTokens(totalTokens)"></span>
        <span class="text-[10px] text-txt-4">tokens</span>
        <span x-show="totalCost > 0" class="text-[10px] text-yellow-accent font-mono" x-text="'¥' + totalCost.toFixed(2)"></span>
      </div>
      <button @click="toggleLang()" class="px-2 py-1 rounded hover:bg-white/10 text-[10px] font-medium text-txt-3 hover:text-white transition-colors" x-text="lang === 'zh' ? 'EN' : '中文'"></button>
      <button @click="showSettings = !showSettings" class="p-1.5 rounded hover:bg-white/10 text-txt-4 hover:text-white transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══ Main Layout ═══ -->
  <div class="flex" style="height: calc(100vh - 44px);">

    <!-- ─── Left Panel: Active Roles ─── -->
    <div class="flex-1 min-w-0 flex flex-col border-r border-border-dim">
      <!-- Panel Header -->
      <div class="flex items-center justify-between px-4 h-9 border-b border-border-dim bg-surface flex-shrink-0">
        <div class="flex items-center gap-2">
          <span class="text-[11px] font-semibold text-green-accent uppercase tracking-wide">工程团队</span>
          <span class="text-[10px] text-txt-4" x-text="activeRoles.length + ' 个角色'"></span>
        </div>
        <div class="flex items-center gap-1">
          <span x-show="isDebating" class="flex items-center gap-1 text-[10px] text-green-accent/70">
            <span class="w-1.5 h-1.5 rounded-full bg-green-accent" style="animation:pulse 1.5s infinite"></span>
            <span x-text="currentPhase"></span>
          </span>
          <button @click="showRoleSelector = !showRoleSelector" class="p-1 rounded hover:bg-white/10 text-txt-4 hover:text-green-accent transition-colors" title="选择角色">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          </button>
        </div>
      </div>

      <!-- Role Selector (collapsible) -->
      <div x-show="showRoleSelector" x-collapse class="border-b border-border-dim bg-surface-4">
        <div class="p-3">
          <!-- Preset templates -->
          <div class="mb-3">
            <span class="text-[10px] font-semibold text-txt-4 uppercase tracking-wider">预设模板</span>
            <div class="flex flex-wrap gap-1.5 mt-1.5">
              <template x-for="tpl in templates" :key="tpl.id">
                <button @click="applyTemplate(tpl)"
                  class="px-2.5 py-1 text-[10px] font-medium rounded-md border transition-colors"
                  :class="currentTemplate === tpl.id ? 'bg-green-accent/15 text-green-accent border-green-accent/30' : 'bg-white/5 text-txt-3 border-white/10 hover:bg-white/10'">
                  <span x-text="tpl.icon"></span> <span x-text="tpl.name"></span>
                </button>
              </template>
            </div>
          </div>
          <!-- Role grid -->
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-1.5">
            <template x-for="role in allRoles" :key="role.id">
              <button @click="toggleRole(role.id)"
                class="role-card flex flex-col items-center gap-1 px-2 py-2 rounded-lg border text-center transition-all"
                :class="activeRoles.includes(role.id)
                  ? 'bg-' + role.color + '/10 border-' + role.color + '/30 text-' + role.color
                  : 'bg-surface-3 border-border-dim text-txt-4 hover:text-txt-2 hover:border-white/20'">
                <span class="text-base" x-text="role.icon"></span>
                <span class="text-[9px] font-semibold leading-tight" x-text="role.name"></span>
              </button>
            </template>
          </div>
        </div>
      </div>

      <!-- Messages: multi-role streams -->
      <div class="flex-1 overflow-y-auto py-2" id="scroll-main">
        <!-- Empty state -->
        <div x-show="messages.length === 0 && !isDebating" class="flex items-center justify-center h-full">
          <div class="text-center max-w-xs">
            <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center bg-gradient-to-br from-green-accent/20 to-yellow-accent/20">
              <span class="text-3xl">⚔️</span>
            </div>
            <p class="text-sm font-semibold text-txt-2 mb-1">多角色对抗辩论</p>
            <p class="text-xs text-txt-4 mb-4">选择参与的角色和预设模板，上传材料后开始</p>
            <div class="flex flex-wrap justify-center gap-1">
              <template x-for="role in activeRoles.map(id => allRoles.find(r => r.id === id)).filter(Boolean)" :key="role.id">
                <span class="px-2 py-0.5 text-[10px] rounded-full border" :class="'bg-' + role.color + '/10 text-' + role.color + ' border-' + role.color + '/20'">
                  <span x-text="role.icon"></span> <span x-text="role.name"></span>
                </span>
              </template>
            </div>
          </div>
        </div>

        <!-- Message stream -->
        <template x-for="(msg, idx) in messages" :key="idx">
          <div class="msg-in flex gap-3 px-4 py-2.5 hover:bg-white/[.03] transition-colors">
            <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 text-xs font-bold"
              :class="'bg-' + getRole(msg.roleId).color + '/20 text-' + getRole(msg.roleId).color">
              <span x-text="getRole(msg.roleId).icon"></span>
            </div>
            <div class="flex-1 min-w-0 pl-2 border-l-2" :class="'border-l-' + getRole(msg.roleId).color + '/30'">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-[10px] font-bold" :class="'text-' + getRole(msg.roleId).color" x-text="getRole(msg.roleId).name"></span>
                <span class="text-[9px] text-txt-4" x-text="'Round ' + msg.round" x-show="msg.round > 0"></span>
                <span x-show="msg.tokens" class="text-[9px] text-txt-4 font-mono" x-text="msg.tokens + ' tok'"></span>
              </div>
              <div class="md-content break-words" x-html="renderMarkdown(msg.content)"></div>
            </div>
          </div>
        </template>

        <!-- Typing indicator -->
        <div x-show="isDebating && typingRoles.length > 0" class="flex gap-3 px-4 py-2.5">
          <div class="flex items-center gap-2">
            <template x-for="rid in typingRoles" :key="rid">
              <div class="flex items-center gap-1.5 px-2 py-1 rounded-full bg-surface-3">
                <span class="text-xs" x-text="getRole(rid).icon"></span>
                <span class="text-[10px] text-txt-3" x-text="getRole(rid).name"></span>
                <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Bottom: Upload + Action -->
      <div class="border-t border-border-dim p-3 flex-shrink-0">
        <!-- File info bar -->
        <div x-show="fileName" class="flex items-center gap-2 mb-2 px-2 py-1.5 bg-surface-3 rounded-md">
          <svg class="w-3.5 h-3.5 text-green-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span class="text-[11px] text-txt-2 truncate" x-text="fileName"></span>
          <span class="text-[10px] text-txt-4" x-text="formatSize(fileSize)"></span>
          <button @click="fileName='';fileContent='';fileSize=0" class="ml-auto text-txt-4 hover:text-red-400 text-xs">&times;</button>
        </div>

        <!-- Upload + direct input -->
        <div class="flex gap-2 mb-2">
          <div class="flex-1 rounded-lg bg-surface-3 border border-border-dim glow-green transition-all cursor-pointer"
               @click="$refs.fileInput.click()"
               @dragover.prevent="$el.classList.add('border-green-accent/50')"
               @dragleave.prevent="$el.classList.remove('border-green-accent/50')"
               @drop.prevent="$el.classList.remove('border-green-accent/50'); handleFileDrop($event)">
            <input type="file" x-ref="fileInput" class="hidden"
                   accept=".pdf,.py,.txt,.md,.csv,.json,.js,.ts,.java,.cpp,.c,.h,.go,.rs,.rb,.php,.html,.css,.yaml,.yml,.toml,.xml,.sh,.sql"
                   @change="handleFileSelect($event)">
            <div class="flex items-center gap-2 px-3 py-2">
              <svg class="w-4 h-4 text-txt-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
              <span class="text-xs text-txt-4" x-text="fileName ? '替换文件' : t('dragDrop')"></span>
            </div>
          </div>
          <button @click="showTextInput = !showTextInput" class="px-3 rounded-lg bg-surface-3 border border-border-dim text-txt-4 hover:text-txt-2 hover:bg-surface-2 transition-colors" title="直接输入文本">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
        </div>

        <!-- Direct text input -->
        <div x-show="showTextInput" x-collapse class="mb-2">
          <textarea x-model="directText" rows="3" :placeholder="t('directInputHint')"
            class="w-full bg-surface-3 border border-border-dim rounded-md px-3 py-2 text-xs text-txt-2 placeholder-txt-4 outline-none focus:border-green-accent/50 prompt-textarea"></textarea>
          <button @click="applyDirectText()" class="mt-1 px-3 py-1 text-[10px] font-medium bg-green-accent/15 text-green-accent rounded hover:bg-green-accent/25 transition-colors">
            <span x-text="t('applyText')"></span>
          </button>
        </div>

        <!-- Action bar -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="text-[10px] text-txt-4" x-show="isDebating" x-text="'第 ' + currentRound + '/' + maxRounds + ' 轮'"></span>
            <div x-show="isDebating" class="w-20 h-1 bg-surface-3 rounded-full overflow-hidden">
              <div class="h-full bg-gradient-to-r from-green-accent to-yellow-accent rounded-full transition-all" :style="'width:' + Math.min((currentRound / maxRounds) * 100, 100) + '%'"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button x-show="isDebating" @click="abortDebate()"
              class="px-3 py-1.5 text-[11px] font-medium bg-white/10 text-txt-2 rounded hover:bg-white/15 transition-colors">
              ■ 停止
            </button>
            <button x-show="!isDebating && messages.length > 0 && consensus" @click="exportCurrentDebate()"
              class="px-3 py-1.5 text-[11px] font-medium bg-white/5 text-txt-3 rounded hover:bg-white/10 transition-colors flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              导出
            </button>
            <button @click="startDebate()" :disabled="!canStart || isDebating"
              class="p-2.5 rounded-lg bg-green-accent text-black transition-all hover:scale-105 disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:scale-100">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ─── Right Sidebar ─── -->
    <div class="w-72 flex-shrink-0 flex flex-col bg-surface-4 border-l border-border-dim overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-border-dim">
        <button @click="sidebarTab = 'roles'" class="flex-1 py-2 text-[11px] font-medium transition-colors"
          :class="sidebarTab === 'roles' ? 'text-white border-b-2 border-green-accent' : 'text-txt-4 hover:text-txt-2'">角色</button>
        <button @click="sidebarTab = 'config'" class="flex-1 py-2 text-[11px] font-medium transition-colors"
          :class="sidebarTab === 'config' ? 'text-white border-b-2 border-yellow-accent' : 'text-txt-4 hover:text-txt-2'">配置</button>
        <button @click="sidebarTab = 'history'" class="flex-1 py-2 text-[11px] font-medium transition-colors"
          :class="sidebarTab === 'history' ? 'text-white border-b-2 border-blue-accent' : 'text-txt-4 hover:text-txt-2'">
          历史 <span x-show="historyList.length > 0" class="text-[9px] text-txt-4" x-text="'(' + historyList.length + ')'"></span>
        </button>
      </div>

      <!-- Roles tab -->
      <div x-show="sidebarTab === 'roles'" class="flex-1 overflow-y-auto p-3 space-y-2">
        <template x-for="role in allRoles" :key="role.id">
          <div class="flex items-center gap-2.5 px-3 py-2 rounded-lg transition-colors cursor-pointer"
            :class="activeRoles.includes(role.id) ? 'bg-white/5' : 'opacity-40 hover:opacity-70'"
            @click="toggleRole(role.id)">
            <span class="text-base" x-text="role.icon"></span>
            <div class="flex-1 min-w-0">
              <div class="text-[11px] font-semibold text-txt-1" x-text="role.name"></div>
              <div class="text-[9px] text-txt-4 truncate" x-text="role.desc"></div>
            </div>
            <div class="w-4 h-4 rounded border flex items-center justify-center flex-shrink-0"
              :class="activeRoles.includes(role.id) ? 'bg-green-accent/20 border-green-accent/40' : 'border-white/20'">
              <svg x-show="activeRoles.includes(role.id)" class="w-3 h-3 text-green-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
          </div>
        </template>
      </div>

      <!-- Config tab -->
      <div x-show="sidebarTab === 'config'" class="flex-1 overflow-y-auto p-3 space-y-3">
        <!-- Global settings -->
        <div class="space-y-2">
          <h3 class="text-[10px] font-bold text-txt-3 uppercase tracking-wider">全局设置</h3>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-[10px] text-txt-4 block mb-0.5">Base URL</label>
              <input type="text" x-model="globalConfig.baseUrl" placeholder="https://api.openai.com/v1"
                class="w-full bg-surface-3 border border-border-dim rounded px-2 py-1.5 text-[11px] text-txt-2 outline-none focus:border-green-accent/50">
            </div>
            <div>
              <label class="text-[10px] text-txt-4 block mb-0.5">API Key</label>
              <input type="password" x-model="globalConfig.apiKey" placeholder="sk-..."
                class="w-full bg-surface-3 border border-border-dim rounded px-2 py-1.5 text-[11px] text-txt-2 outline-none focus:border-green-accent/50">
            </div>
          </div>
          <div>
            <label class="text-[10px] text-txt-4 block mb-0.5">默认模型</label>
            <input type="text" x-model="globalConfig.model" placeholder="deepseek-v4-flash"
              class="w-full bg-surface-3 border border-border-dim rounded px-2 py-1.5 text-[11px] text-txt-2 outline-none focus:border-green-accent/50">

                class="w-16 bg-surface-3 border border-border-dim rounded px-2 py-1.5 text-[11px] text-txt-2 outline-none focus:border-white/30">

            <div>
              <label class="text-[10px] text-txt-4 block mb-0.5">共识模式</label>
              <select x-model="consensusMode" class="bg-surface-3 border border-border-dim rounded px-2 py-1.5 text-[11px] text-txt-2 outline-none focus:border-white/30">
                <option value="auto">自动检测</option>
                <option value="vote">投票表决</option>
                <option value="all">全部完成</option>

            </div>

        </div>

        <!-- Per-role model override -->
        <div class="space-y-2">
          <h3 class="text-[10px] font-bold text-txt-3 uppercase tracking-wider">角色模型覆盖</h3>
          <p class="text-[10px] text-txt-4">留空则使用全局模型</p>
          <template x-for="roleId in activeRoles" :key="roleId">
            <div class="flex items-center gap-2">
              <span class="text-xs" x-text="getRole(roleId).icon"></span>
              <span class="text-[10px] text-txt-3 w-20 truncate" x-text="getRole(roleId).name"></span>
              <input type="text" x-model="roleModelOverrides[roleId]" :placeholder="globalConfig.model || 'model'"
                class="flex-1 bg-surface-3 border border-border-dim rounded px-2 py-1 text-[10px] text-txt-2 outline-none focus:border-white/30">
            </div>
          </template>
        </div>

        <!-- Prompt editor -->
        <div class="space-y-2">
          <h3 class="text-[10px] font-bold text-txt-3 uppercase tracking-wider">Prompt 编辑</h3>
          <template x-for="roleId in activeRoles" :key="roleId">
            <div>
              <div class="flex items-center justify-between mb-0.5">
                <label class="text-[10px] font-medium text-txt-3">
                  <span x-text="getRole(roleId).icon"></span> <span x-text="getRole(roleId).name"></span>
                </label>
                <button @click="rolePrompts[roleId] = getRole(roleId).defaultPrompt" class="text-[9px] text-txt-4 hover:text-txt-2">重置</button>
              </div>
              <textarea x-model="rolePrompts[roleId]" rows="2"
                class="w-full bg-surface-3 border border-border-dim rounded px-2 py-1.5 text-[10px] text-txt-2 outline-none focus:border-white/30 prompt-textarea"></textarea>
            </div>
          </template>
        </div>

        <!-- Save -->
        <button @click="saveConfig()" class="w-full px-3 py-2 text-[11px] font-medium bg-green-accent/15 text-green-accent rounded hover:bg-green-accent/25 transition-colors flex items-center justify-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          保存配置
        </button>
        <span x-show="configSaved" x-transition class="block text-center text-green-accent text-[11px] font-medium">✓ 已保存</span>
      </div>

      <!-- History tab -->
      <div x-show="sidebarTab === 'history'" class="flex-1 overflow-y-auto">
        <div x-show="historyList.length === 0" class="text-center py-10">
          <div class="text-3xl mb-2 opacity-30">📭</div>
          <p class="text-[11px] text-txt-4">暂无历史记录</p>

        <template x-for="h in historyList" :key="h.id">
          <button @click="loadHistory(h)" class="w-full text-left px-3 py-2.5 border-b border-border-dim hover:bg-white/5 transition-colors group">
            <div class="flex items-center justify-between mb-1">
              <span class="text-[11px] text-txt-2 font-medium truncate" x-text="h.fileName || '文本输入'"></span>
              <span class="text-[9px] text-txt-4" x-text="formatDate(h.timestamp)"></span>
            </div>
            <div class="flex items-center gap-1.5 mb-1">
              <template x-for="rid in (h.roleIds || []).slice(0, 4)" :key="rid">
                <span class="text-[10px]" x-text="getRole(rid).icon"></span>
              </template>
              <span x-show="(h.roleIds || []).length > 4" class="text-[9px] text-txt-4" x-text="'+' + ((h.roleIds||[]).length - 4)"></span>
              <span class="text-[9px] text-txt-4 ml-auto" x-text="h.rounds + '轮'"></span>
            </div>
            <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
              <button @click.stop="exportHistory(h, 'md')" class="px-1.5 py-0.5 text-[9px] bg-white/5 text-txt-3 rounded hover:bg-white/10">MD</button>
              <button @click.stop="exportHistory(h, 'json')" class="px-1.5 py-0.5 text-[9px] bg-white/5 text-txt-3 rounded hover:bg-white/10">JSON</button>
              <button @click.stop="deleteHistory(h.id)" class="px-1.5 py-0.5 text-[9px] bg-red-500/10 text-red-400 rounded hover:bg-red-500/20 ml-auto">🗑</button>
            </div>
          </button>
        </template>
        <div x-show="historyList.length > 0" class="p-3 border-t border-border-dim sticky bottom-0 bg-surface-4">
          <button @click="clearAllHistory()" class="w-full px-3 py-1.5 text-[10px] font-medium bg-red-500/10 text-red-400 rounded hover:bg-red-500/20 transition-colors">🗑 清空所有</button>
        </div>
      </div>

      <!-- Consensus card (always visible at bottom when available) -->
      <div x-show="consensus" x-cloak class="border-t border-border-dim">
        <button @click="showConsensus = !showConsensus" class="w-full flex items-center justify-between px-3 py-2 hover:bg-white/5 transition-colors">
          <div class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 text-green-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="text-[10px] font-bold text-green-accent">共识结论</span>
          </div>
          <svg class="w-3 h-3 text-txt-4 transition-transform" :class="showConsensus && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div x-show="showConsensus" x-collapse class="px-3 pb-3 max-h-48 overflow-y-auto">
          <div class="md-content text-[11px]" x-html="renderMarkdown(consensus)"></div>
        </div>

    </div>
  </div>

  <!-- Error toast -->
  <div x-show="error" x-cloak x-transition
    class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 bg-red-500/90 text-white text-sm px-4 py-2 rounded-lg shadow-lg flex items-center gap-2">
    <span x-text="error"></span>
    <button @click="error = ''" class="text-white/70 hover:text-white">&times;</button>
  </div>

  <script>
    // ═══ Roles ═══
    const ALL_ROLES = [
      { id:'architect', name:'架构师', icon:'🏗️', color:'blue-accent', desc:'设计系统架构，评估技术权衡',
        defaultPrompt:'你是架构师。分析代码/系统的架构设计，评估技术权衡，提出结构性改进建议。关注：模块划分、依赖关系、扩展性、可维护性。用中文回答。' },
      { id:'developer', name:'开发者', icon:'💻', color:'green-accent', desc:'实现功能，编写生产级代码',
        defaultPrompt:'你是高级开发者。分析代码实现，提供具体的代码改进方案，关注：代码质量、设计模式、性能优化、最佳实践。给出改进后的代码示例。用中文回答。' },
      { id:'reviewer', name:'审查者', icon:'🛡️', color:'rose-accent', desc:'代码审查，发现 bug 和安全问题',
        defaultPrompt:'你是代码审查者。严格审查代码，找出：bug、安全漏洞、性能问题、代码异味。不要无理由反对——如果代码确实好，表示认可。发现问题时详细说明并给出修复方案。用中文回答。' },
      { id:'debugger', name:'调试工程师', icon:'🔍', color:'orange-accent', desc:'定位根因，分析堆栈和内存',
        defaultPrompt:'你是调试工程师。分析代码中的潜在 bug 和运行时问题，关注：边界条件、异常处理、并发问题、资源泄漏。提供根因分析和修复方案。用中文回答。' },
      { id:'tester', name:'测试工程师', icon:'🧪', color:'violet-accent', desc:'设计测试用例，覆盖边界情况',
        defaultPrompt:'你是测试工程师。为代码设计全面的测试方案，包括：单元测试、集成测试、边界用例、异常场景。提供具体的测试代码。找出开发者可能忽略的 edge case。用中文回答。' },
      { id:'security', name:'安全工程师', icon:'🔒', color:'red-accent', desc:'STRIDE 安全分析，攻击面评估',
        defaultPrompt:'你是安全工程师。基于 STRIDE 模型进行安全分析：伪造身份、篡改数据、抵赖、信息泄露、拒绝服务、权限提升。枚举攻击面和信任边界，发现潜在漏洞并给出修复建议。用中文回答。' },
      { id:'docs', name:'文档工程师', icon:'📘', color:'cyan-accent', desc:'审查文档完整性和一致性',
        defaultPrompt:'你是文档工程师。审查代码文档的完整性和一致性，包括：README、API 文档、注释、CHANGELOG。指出文档缺失或过时的地方，提供改进建议。用中文回答。' },
      { id:'migration', name:'迁移工程师', icon:'🗄️', color:'amber-500', desc:'数据迁移的回滚安全和兼容性',
        defaultPrompt:'你是迁移工程师。审查数据库/系统迁移方案，关注：回滚安全性、幂等性、向后兼容、零停机准备。发现迁移风险并给出安全建议。用中文回答。' },
      { id:'i18n', name:'国际化工程师', icon:'🌐', color:'emerald-accent', desc:'多语言、RTL、本地化审查',
        defaultPrompt:'你是国际化工程师。审查代码的国际化支持，关注：硬编码字符串、地区格式化、RTL 支持、翻译覆盖度。给出国际化改进建议。用中文回答。' },
      { id:'ml', name:'ML 工程师', icon:'📈', color:'pink-accent', desc:'训练指标、超参调整、收敛分析',
        defaultPrompt:'你是机器学习工程师。分析代码中的 ML 相关部分，关注：模型架构、训练流程、超参数选择、过拟合/欠拟合、数据质量。给出优化建议。用中文回答。' },
    ];

    // ═══ Templates ═══
    const TEMPLATES = [
      { id:'code-review', name:'代码审查', icon:'🔍', roles:['developer','reviewer','tester','security'] },
      { id:'full-audit', name:'全面审计', icon:'⚡', roles:['architect','developer','reviewer','security','docs','tester'] },
      { id:'paper-review', name:'论文审稿', icon:'📄', roles:['architect','reviewer','docs'] },
      { id:'security-scan', name:'安全扫描', icon:'🛡️', roles:['security','reviewer','debugger'] },
      { id:'ml-pipeline', name:'ML 管道', icon:'🤖', roles:['ml','developer','tester','reviewer'] },
    ];

    const I18N = {
      zh: { subtitle:'多角色 AI 工程团队对抗平台', dragDrop:'上传文件', directInputHint:'粘贴论文摘要、代码片段或任何文本...', applyText:'使用此文本' },
      en: { subtitle:'Multi-role AI engineering team adversarial platform', dragDrop:'Upload file', directInputHint:'Paste an abstract, code snippet, or any text...', applyText:'Use This Text' },
    };

    if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    if (typeof marked !== 'undefined') marked.setOptions({
      highlight: (code, lang) => { if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value; return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code; },
      breaks: true, gfm: true,
    });

    function app() {
      return {
        lang: 'zh',
        t(k) { return (I18N[this.lang]||I18N.zh)[k]||k; },
        toggleLang() { this.lang = this.lang==='zh'?'en':'zh'; localStorage.setItem('debateai_lang',this.lang); },

        // State
        allRoles: ALL_ROLES,
        templates: TEMPLATES,
        activeRoles: ['developer','reviewer','architect'],
        currentTemplate: '',
        showRoleSelector: false,
        showSettings: false,
        showTextInput: false,
        showConsensus: true,
        sidebarTab: 'roles',

        // File
        fileName: '', fileSize: 0, fileContent: '', directText: '',

        // Config
        globalConfig: { baseUrl:'', apiKey:'', model:'' },
        roleModelOverrides: {},
        rolePrompts: {},
        maxRounds: 4,
        consensusMode: 'auto',
        configSaved: false,

        // Debate
        isDebating: false, messages: [], consensus: '', currentRound: 0, currentPhase: '',
        error: '', abortController: null, typingRoles: [],
        totalTokens: 0, totalCost: 0,

        // History
        historyList: [],

        get canStart() {
          return (this.fileContent || this.directText) && this.globalConfig.baseUrl && this.globalConfig.apiKey && this.globalConfig.model && this.activeRoles.length >= 2;
        },

        init() {
          this.lang = localStorage.getItem('debateai_lang')||'zh';
          this.allRoles.forEach(r => { this.rolePrompts[r.id] = r.defaultPrompt; });
          this.loadConfig(); this.loadHistoryList();
        },

        getRole(id) { return this.allRoles.find(r => r.id === id) || { id:'?', name:'未知', icon:'❓', color:'txt-3', desc:'' }; },

        toggleRole(id) {
          const i = this.activeRoles.indexOf(id);
          if (i >= 0) { if (this.activeRoles.length > 2) this.activeRoles.splice(i, 1); }
          else { this.activeRoles.push(id); }
          this.currentTemplate = '';
        },

        applyTemplate(tpl) {
          this.activeRoles = [...tpl.roles];
          this.currentTemplate = tpl.id;
        },

        // File handling
        async handleFileDrop(e) { const f = e.dataTransfer.files[0]; if (f) await this.processFile(f); },
        async handleFileSelect(e) { const f = e.target.files[0]; if (f) await this.processFile(f); },
        async processFile(file) {
          const ext = file.name.split('.').pop().toLowerCase();
          const ok = ['pdf','py','txt','md','csv','json','js','ts','java','cpp','c','h','go','rs','rb','php','html','css','yaml','yml','toml','xml','sh','sql'];
          if (!ok.includes(ext)) { this.error = '不支持的文件格式'; return; }
          this.fileName = file.name; this.fileSize = file.size; this.error = ''; this.directText = '';
          this.fileContent = ext === 'pdf' ? await this.parsePDF(file) : await this.readText(file);
        },
        readText(f) { return new Promise((res,rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = () => rej(new Error('Read failed')); r.readAsText(f); }); },
        async parsePDF(f) { const b = await f.arrayBuffer(); const p = await pdfjsLib.getDocument({data:b}).promise; let t = ''; for (let i=1;i<=p.numPages;i++) { const pg = await p.getPage(i); const c = await pg.getTextContent(); t += c.items.map(x=>x.str).join(' ')+'\n\n'; } return t.trim(); },
        formatSize(b) { if (b<1024) return b+' B'; if (b<1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; },
        applyDirectText() { if (this.directText.trim()) { this.fileContent = this.directText.trim(); this.fileName = '直接输入文本'; this.fileSize = this.fileContent.length; } },
        formatTokens(n) { if (n>=1000000) return (n/1000000).toFixed(1)+'M'; if (n>=1000) return (n/1000).toFixed(1)+'K'; return n; },
        formatDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString(this.lang==='zh'?'zh-CN':'en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); },
        renderMarkdown(t) { if (!t) return ''; try { return marked.parse(t); } catch(e) { return t.replace(/</g,'&lt;').replace(/>/g,'&gt;'); } },

        // Config
        saveConfig() {
          localStorage.setItem('debateai_config', JSON.stringify({
            globalConfig: this.globalConfig, maxRounds: this.maxRounds, consensusMode: this.consensusMode,
            roleModelOverrides: this.roleModelOverrides, rolePrompts: this.rolePrompts,
            activeRoles: this.activeRoles,
          }));
          this.configSaved = true; setTimeout(() => this.configSaved = false, 2000);
        },
        loadConfig() {
          try {
            const d = JSON.parse(localStorage.getItem('debateai_config'));
            if (!d) return;
            if (d.globalConfig) this.globalConfig = {...this.globalConfig, ...d.globalConfig};
            if (d.maxRounds) this.maxRounds = d.maxRounds;
            if (d.consensusMode) this.consensusMode = d.consensusMode;
            if (d.roleModelOverrides) this.roleModelOverrides = d.roleModelOverrides;
            if (d.rolePrompts) Object.assign(this.rolePrompts, d.rolePrompts);
            if (d.activeRoles) this.activeRoles = d.activeRoles;
          } catch(e) {}
        },

        // ═══ Debate Engine ═══
        async startDebate() {
          if (!this.canStart) return;
          const content = this.fileContent || this.directText;
          if (!content) return;
          if (this.directText && !this.fileContent) { this.fileContent = this.directText.trim(); this.fileName = '文本输入'; }

          this.isDebating = true; this.messages = []; this.consensus = ''; this.currentRound = 0;
          this.error = ''; this.abortController = new AbortController();
          this.totalTokens = 0; this.totalCost = 0;

          const roles = this.activeRoles.map(id => this.allRoles.find(r => r.id === id)).filter(Boolean);

          try {
            for (let round = 1; round <= this.maxRounds; round++) {
              this.currentRound = round;

              for (const role of roles) {
                this.currentPhase = `${role.icon} ${role.name} — Round ${round}`;
                this.typingRoles = [role.id];

                const prompt = this.rolePrompts[role.id] || role.defaultPrompt;
                const context = this.buildContext(role.id, content, round);
                const messages = [
                  { role: 'system', content: prompt },
                  { role: 'user', content: context }
                ];

                const msg = this.addMessage(role.id, '', round);
                const model = this.roleModelOverrides[role.id] || this.globalConfig.model;
                const config = { ...this.globalConfig, model };

                await this.callLLM(config, messages, (chunk, meta) => {
                  this.appendToMessage(msg, chunk);
                  if (meta && meta.tokens) {
                    msg.tokens = (msg.tokens || 0) + meta.tokens;
                    this.totalTokens += meta.tokens;
                  }
                });

                this.typingRoles = this.typingRoles.filter(r => r !== role.id);

                // Check consensus
                if (this.consensusMode === 'auto' && round >= 2 && this.detectConsensus(msg.content)) {
                  this.consensus = msg.content;
                  break;
                }
              }

              if (this.consensus) break;

              // Vote mode: check if majority agrees
              if (this.consensusMode === 'vote' && round >= 2) {
                const roundMsgs = this.messages.filter(m => m.round === round);
                const agrees = roundMsgs.filter(m => this.detectConsensus(m.content)).length;
                if (agrees > roles.length / 2) {
                  await this.extractConsensus();
                  break;
                }
              }
            }

            if (!this.consensus) {
              await this.extractConsensus();
            }

            this.saveToHistory();

          } catch (e) {
            this.error = e.name === 'AbortError' ? '辩论已中止' : `Error: ${e.message}`;
          } finally {
            this.isDebating = false; this.typingRoles = []; this.abortController = null;
            this.currentPhase = '';
          }
        },

        buildContext(roleId, content, round) {
          const prev = this.messages.filter(m => m.round < round || (m.round === round && m.roleId !== roleId));
          let ctx = `## 待分析材料\n\n${content}\n\n`;
          if (prev.length > 0) {
            ctx += `## 之前角色的分析\n\n`;
            for (const m of prev.slice(-6)) {
              const r = this.getRole(m.roleId);
              ctx += `### ${r.icon} ${r.name} (Round ${m.round})\n\n${m.content}\n\n---\n\n`;
            }
          }
          ctx += `\n请基于你的角色职责进行分析。如果是后续轮次，请回应或补充其他角色的观点。`;
          return ctx;
        },

        addMessage(roleId, content, round) {
          const m = { roleId, content, round, tokens: 0, id: Date.now()+Math.random() };
          this.messages.push(m);
          this.$nextTick(() => { const el = document.getElementById('scroll-main'); if (el) el.scrollTop = el.scrollHeight; });
          return m;
        },

        appendToMessage(msg, chunk) {
          msg.content += chunk;
          if (!this._sth) {
            this._sth = true;
            requestAnimationFrame(() => { const el = document.getElementById('scroll-main'); if (el) el.scrollTop = el.scrollHeight; this._sth = false; });
          }
        },

        async callLLM(config, messages, onChunk) {
          const signal = this.abortController?.signal;
          const resp = await fetch(config.baseUrl.replace(/\/+$/,'') + '/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${config.apiKey}` },
            body: JSON.stringify({ model: config.model, messages, stream: true }),
            signal
          });
          if (!resp.ok) { const t = await resp.text().catch(()=>`API error ${resp.status}`); throw new Error(t.slice(0,200)); }
          const reader = resp.body.getReader(), dec = new TextDecoder(); let buf = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += dec.decode(value, { stream: true });
            const lines = buf.split('\n'); buf = lines.pop()||'';
            for (const l of lines) {
              const tr = l.trim(); if (!tr || !tr.startsWith('data:')) continue;
              const d = tr.slice(5).trim(); if (d === '[DONE]') return;
              try {
                const j = JSON.parse(d);
                const dt = j.choices?.[0]?.delta;
                const usage = j.usage;
                if (dt?.content) onChunk(dt.content, usage ? { tokens: usage.total_tokens } : null);
              } catch(e) {}
            }
          }
        },

        detectConsensus(text) {
          const kws = ['同意','认可','达成共识','没有异议','你说得对','有道理','agree','consensus','我同意','完全同意','基本同意','I agree','no objections','common ground','一致认为','共识','无异议'];
          return kws.some(k => text.toLowerCase().includes(k.toLowerCase()));
        },

        async extractConsensus() {
          const summary = this.messages.map(m => {
            const r = this.getRole(m.roleId);
            return `### ${r.icon} ${r.name} (Round ${m.round})\n\n${m.content}`;
          }).join('\n\n---\n\n');

          const roles = this.activeRoles.map(id => this.getRole(id));
          const prompt = `你是总结者。根据以下 ${roles.length} 个角色的分析讨论，提炼共识，输出最终结论。用 Markdown 格式。`;

          const msg = this.addMessage('architect', '', 0); // reuse architect for consensus
          await this.callLLM(this.globalConfig, [
            { role: 'system', content: prompt },
            { role: 'user', content: `## 多角色讨论记录\n\n${summary}` }
          ], (chunk) => this.appendToMessage(msg, chunk));

          this.consensus = msg.content;
        },

        abortDebate() { if (this.abortController) this.abortController.abort(); },

        // History
        loadHistoryList() { try { this.historyList = JSON.parse(localStorage.getItem('debateai_history'))||[]; } catch(e) { this.historyList = []; } },
        saveToHistory() {
          const r = {
            id: Date.now(), timestamp: new Date().toISOString(),
            fileName: this.fileName, fileSize: this.fileSize,
            roleIds: [...this.activeRoles], rounds: this.currentRound,
            model: this.globalConfig.model,
            messages: JSON.parse(JSON.stringify(this.messages)),
            consensus: this.consensus,
          };
          this.historyList.unshift(r); if (this.historyList.length > 50) this.historyList = this.historyList.slice(0,50);
          localStorage.setItem('debateai_history', JSON.stringify(this.historyList));
        },
        loadHistory(h) {
          this.messages = h.messages||[]; this.consensus = h.consensus||'';
          this.currentRound = h.rounds||0; this.fileName = h.fileName||'';
          if (h.roleIds) this.activeRoles = h.roleIds;
          this.$nextTick(() => { const el = document.getElementById('scroll-main'); if (el) el.scrollTop = el.scrollHeight; });
        },
        deleteHistory(id) { this.historyList = this.historyList.filter(h=>h.id!==id); localStorage.setItem('debateai_history',JSON.stringify(this.historyList)); },
        clearAllHistory() { this.historyList = []; localStorage.removeItem('debateai_history'); },
        exportCurrentDebate() {
          if (!this.messages.length) return;
          this.exportHistory({ fileName:this.fileName, timestamp:new Date().toISOString(), roleIds:this.activeRoles, rounds:this.currentRound, model:this.globalConfig.model, messages:this.messages, consensus:this.consensus }, 'md');
        },
        exportHistory(h, fmt) {
          let c, m, e;
          if (fmt==='json') { c=JSON.stringify(h,null,2); m='application/json'; e='json'; }
          else {
            c = `# DebateAI 多角色辩论记录\n\n- **文件**: ${h.fileName||'N/A'}\n- **日期**: ${new Date(h.timestamp).toLocaleString()}\n- **角色**: ${(h.roleIds||[]).map(id=>this.getRole(id).icon+' '+this.getRole(id).name).join(', ')}\n- **模型**: ${h.model||'N/A'}\n- **轮次**: ${h.rounds}\n\n---\n\n`;
            for (const msg of (h.messages||[])) { const r=this.getRole(msg.roleId); c+=`## ${r.icon} ${r.name} — Round ${msg.round}\n\n${msg.content}\n\n---\n\n`; }
            if (h.consensus) c+=`## 🤝 共识结论\n\n${h.consensus}\n`;
            m='text/markdown'; e='md';
          }
          const blob=new Blob([c],{type:m}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`debate-${h.fileName||'text'}-${h.id||Date.now()}.${e}`; a.click(); URL.revokeObjectURL(url);
        },
      };
    }
  </script>
</body>
